<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Inbound Movement</title></head>
<body>
<section class="container-fluid">
    <h2 class="mb-4">Inbound Movement Report</h2>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-bordered">
                <thead class="table-light">
                <tr>
                    <th>DATE</th>
                    <th>GRN NO</th>
                    <th>SKU</th>
                    <th>PRODUCT NAME</th>
                    <th class="text-end">RECEIVED QTY</th>
                    <th>BIN</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${inboundPage.content}">
                    <td th:text="${#temporals.format(item.inboundDate, 'yyyy-MM-dd HH:mm')}"></td>
                    <td class="text-primary fw-bold" th:text="${item.grnNumber}"></td>
                    <td th:text="${item.skuCode}"></td>
                    <td th:text="${item.productName}"></td>
                    <td class="text-end text-success fw-bold" th:text="${item.receivedQuantity}"></td>
                    <td th:text="${item.assignedBin}"></td>
                </tr>
                </tbody>
            </table>

            <div class="d-flex justify-content-between align-items-center mt-3" th:if="${inboundPage.totalPages > 0}">
                <div class="text-muted">Showing [[${inboundPage.number * inboundPage.size + 1}]] to [[${Math.min((inboundPage.number + 1) * inboundPage.size, inboundPage.totalElements)}]] of [[${inboundPage.totalElements}]]</div>
                <nav th:if="${inboundPage.totalPages > 1}">
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/wm/reports/inbound(page=${currentPage - 1})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, inboundPage.totalPages - 1)}"
                            th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:href="@{/wm/reports/inbound(page=${i})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == inboundPage.totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/wm/reports/inbound(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</section>
</body>
</html>
