<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Users - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar-admin}"></div>
        <div class="main-content">
            <div th:replace="~{fragments/layout :: topbar('User Management')}"></div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card">
                    <div class="card-header">
                        <h2>All Users</h2>
                        <a th:href="@{/admin/users/new}" class="btn btn-primary btn-sm">+ New User</a>
                    </div>
                    <div class="card-body">
                        <div>
                            <form th:action="@{/admin/users}" method="get" class="search-bar">
                                <input type="text" name="keyword" class="form-control"
                                       placeholder="Search user by name..." th:value="${keyword}">
                                <button type="submit" class="btn btn-outline">Search</button>
                                <a th:if="${keyword != null}" th:href="@{/admin/users}"
                                   class="btn btn-outline">Clear filter</a>
                            </form>
                        </div>
                        <div th:if="${#lists.isEmpty(users)}" class="empty-state">
                            <p>No users found.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(users)}" class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Username</th>
                                        <th>Full Name</th>
                                        <th>Role</th>
                                        <th>Warehouse</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="u, iter : ${users}">
                                        <td th:text="${iter.count}"></td>
                                        <td><strong th:text="${u.username}"></strong></td>
                                        <td th:text="${u.fullName}"></td>
                                        <td><span class="badge badge-info" th:text="${u.role}"></span></td>
                                        <td th:text="${u.warehouse != null} ? ${u.warehouse.warehouseName} : '—'"></td>
                                        <td>
                                            <span th:if="${u.isActive}" class="badge badge-success">Active</span>
                                            <span th:unless="${u.isActive}" class="badge badge-danger">Inactive</span>
                                        </td>
                                        <td>
                                            <div class="btn-group">
                                                <a th:href="@{/admin/users/{id}/edit(id=${u.userId})}"
                                                    class="btn btn-outline btn-sm">Edit</a>
                                                <form th:action="@{/admin/users/{id}/toggle(id=${u.userId})}"
                                                    method="post" style="display:inline;">
                                                    <button type="submit"
                                                        th:class="${u.isActive} ? 'btn btn-warning btn-sm' : 'btn btn-success btn-sm'"
                                                        th:text="${u.isActive} ? 'Deactivate' : 'Activate'"></button>
                                                </form>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
