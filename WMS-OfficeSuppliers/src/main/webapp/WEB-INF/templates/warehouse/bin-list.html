<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Bins - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-warehouse}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Bin Management')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header">
                    <h2>Bins</h2>
                    <a th:href="@{/warehouse/bins/new}" class="btn btn-primary btn-sm">+ New Bin</a>
                </div>
                <div class="card-body">
                    <div>
                        <form th:action="@{/warehouse/bins}" method="get" class="search-bar">
                            <input type="text" name="keyword" class="form-control"
                                   placeholder="Search by code(e.g. W01...)" th:value="${keyword}">
                            <button type="submit" class="btn btn-outline">Search</button>
                            <a th:if="${keyword != null}" th:href="@{/warehouse/bins}" class="btn btn-outline">Clear</a>
                        </form>
                    </div>
                    <div th:if="${#lists.isEmpty(bins)}" class="empty-state">
                        <p>No bins found. Create your first bin.</p>
                    </div>
                    <div th:unless="${#lists.isEmpty(bins)}" class="table-wrapper">
                        <table>
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Location</th>
                                <th>Max Weight (kg)</th>
                                <th>Current Weight (kg)</th>
                                <th>Available (kg)</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="bin, iter : ${bins}">
                                <td th:text="${iter.count}"></td>
                                <td><strong th:text="${bin.binLocation}"></strong></td>
                                <td th:text="${bin.maxWeight}"></td>
                                <td th:text="${currentWeights[bin.binId]}"></td>
                                <td>
                                            <span th:text="${availableCapacities[bin.binId]}"
                                                  th:class="${availableCapacities[bin.binId].compareTo(T(java.math.BigDecimal).ZERO) == 0} ? 'badge badge-danger' : ''"></span>
                                </td>
                                <td>
                                    <span th:if="${bin.isActive}" class="badge badge-success">Active</span>
                                    <span th:unless="${bin.isActive}" class="badge badge-danger">Inactive</span>
                                </td>
                                <td>
                                    <div class="btn-group">
                                        <a th:href="@{/warehouse/bins/{id}/edit(id=${bin.binId})}"
                                           class="btn btn-outline btn-sm">Edit</a>
                                        <form th:action="@{/warehouse/bins/{id}/toggle(id=${bin.binId})}"
                                              method="post" style="display:inline;">
                                            <button type="submit"
                                                    th:class="${bin.isActive} ? 'btn btn-warning btn-sm' : 'btn btn-success btn-sm'"
                                                    th:text="${bin.isActive} ? 'Deactivate' : 'Activate'"></button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
