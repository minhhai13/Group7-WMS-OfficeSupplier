<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${warehouse.warehouseId != null} ? 'Edit Warehouse' : 'New Warehouse'">Warehouse Form</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-admin}"></div>
    <div class="main-content">
        <div
                th:replace="~{fragments/layout :: topbar(${warehouse.warehouseId != null} ? 'Edit Warehouse' : 'New Warehouse')}">
        </div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card" style="max-width:600px;">
                <div class="card-header">
                    <h2 th:text="${warehouse.warehouseId != null} ? 'Edit Warehouse' : 'Create New Warehouse'">Form
                    </h2>
                </div>
                <div class="card-body">
                    <form th:action="@{/admin/warehouses/save}" method="post" th:object="${warehouse}">
                        <input type="hidden" th:field="*{warehouseId}">

                        <div class="form-group">
                            <label for="warehouseCode">Warehouse Code *</label>
                            <input type="text" id="warehouseCode" class="form-control" th:field="*{warehouseCode}"
                                   required maxlength="20" placeholder="e.g. WH-001"
                                   th:classappend="${#fields.hasErrors('warehouseCode')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('warehouseCode')}"
                                 th:errors="*{warehouseCode}">Code error</div>
                        </div>

                        <div class="form-group">
                            <label for="warehouseName">Warehouse Name *</label>
                            <input type="text" id="warehouseName" class="form-control" th:field="*{warehouseName}"
                                   required maxlength="100" placeholder="Enter warehouse name"
                                   th:classappend="${#fields.hasErrors('warehouseName')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('warehouseName')}"
                                 th:errors="*{warehouseName}">Name error</div>
                        </div>

                        <div class="form-group">
                            <label for="address">Address</label>
                            <input type="text" id="address" class="form-control" th:field="*{address}"
                                   maxlength="255" placeholder="Enter address"
                                   th:classappend="${#fields.hasErrors('address')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:if="${#fields.hasErrors('address')}"
                                 th:errors="*{address}">Address error</div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn btn-primary">Save Warehouse</button>
                            <a th:href="@{/admin/warehouses}" class="btn btn-outline">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
