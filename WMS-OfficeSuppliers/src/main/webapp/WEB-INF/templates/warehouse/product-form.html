<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${product.productId != null} ? 'Edit Product' : 'New Product'">Product Form</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar-warehouse}"></div>
        <div class="main-content">
            <div
                th:replace="~{fragments/layout :: topbar(${product.productId != null} ? 'Edit Product' : 'New Product')}">
            </div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card" style="max-width:600px;">
                    <div class="card-header">
                        <h2 th:text="${product.productId != null} ? 'Edit Product' : 'Create New Product'">Form</h2>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/warehouse/products/save}" method="post" th:object="${product}">
                            <input type="hidden" th:field="*{productId}">

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="sku">SKU *</label>
                                    <input type="text" id="sku" class="form-control" th:field="*{sku}" required
                                        maxlength="50" placeholder="e.g. OFS-001"
                                        th:classappend="${#fields.hasErrors('sku')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('sku')}"
                                        th:errors="*{sku}">SKU error</div>
                                </div>
                                <div class="form-group">
                                    <label for="productName">Product Name *</label>
                                    <input type="text" id="productName" class="form-control" th:field="*{productName}"
                                        required maxlength="100" placeholder="Enter product name"
                                        th:classappend="${#fields.hasErrors('productName')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('productName')}"
                                        th:errors="*{productName}">Name error</div>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="unitWeight">Unit Weight (kg)</label>
                                    <input type="number" id="unitWeight" class="form-control" th:field="*{unitWeight}"
                                        min="0" step="0.01" placeholder="e.g. 0.50"
                                        th:classappend="${#fields.hasErrors('unitWeight')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('unitWeight')}"
                                        th:errors="*{unitWeight}">Weight error</div>
                                </div>
                                <div class="form-group">
                                    <label for="baseUoM">Base UoM *</label>
                                    <input type="text" id="baseUoM" class="form-control" th:field="*{baseUoM}" required
                                        maxlength="20" placeholder="e.g. Piece"
                                        th:classappend="${#fields.hasErrors('baseUoM')} ? 'is-invalid'">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('baseUoM')}"
                                        th:errors="*{baseUoM}">UoM error</div>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="minStockLevel">Minimum Stock Level</label>
                                <input type="number" id="minStockLevel" class="form-control" th:field="*{minStockLevel}"
                                    min="0" placeholder="e.g. 10"
                                    th:classappend="${#fields.hasErrors('minStockLevel')} ? 'is-invalid'">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('minStockLevel')}"
                                    th:errors="*{minStockLevel}">Stock level error</div>
                            </div>

                            <div class="form-actions">
                                <button type="submit" class="btn btn-primary">Save Product</button>
                                <a th:href="@{/warehouse/products}" class="btn btn-outline">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
