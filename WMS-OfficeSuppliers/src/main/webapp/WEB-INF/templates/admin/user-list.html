<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Users - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-admin}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('User Management')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header">
                    <h2>All Users</h2>
                    <a th:href="@{/admin/users/new}" class="btn btn-primary btn-sm">+ New User</a>
                </div>
                <div class="card-body">
                    <!-- Search -->
                    <div>
                        <form th:action="@{/admin/users}" method="get" class="search-bar">
                            <input type="text" name="keyword" class="form-control"
                                   placeholder="Search user by name..." th:value="${keyword}">
                            <button type="submit" class="btn btn-outline">Search</button>
                            <a th:if="${keyword != null}" th:href="@{/admin/users}"
                               class="btn btn-outline">Clear filter</a>
                        </form>
                    </div>

                    <!-- Result info -->
                    <div th:if="${totalElements != null}" style="margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.875rem;">
                        Showing
                        <strong th:text="${currentPage * 10 + 1}"></strong>–<strong th:text="${(currentPage * 10 + #lists.size(users))}"></strong>
                        of <strong th:text="${totalElements}"></strong> users
                    </div>

                    <!-- Empty state -->
                    <div th:if="${#lists.isEmpty(users)}" class="empty-state">
                        <p>No users found.</p>
                    </div>

                    <!-- Table -->
                    <div th:unless="${#lists.isEmpty(users)}" class="table-wrapper">
                        <table>
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Username</th>
                                <th>Full Name</th>
                                <th>Role</th>
                                <th>Warehouse</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="u, iter : ${users}">
                                <td th:text="${currentPage * 10 + iter.count}"></td>
                                <td><strong th:text="${u.username}"></strong></td>
                                <td th:text="${u.fullName}"></td>
                                <td><span class="badge badge-info" th:text="${u.role}"></span></td>
                                <td th:text="${u.warehouse != null} ? ${u.warehouse.warehouseName} : '—'"></td>
                                <td>
                                    <span th:if="${u.isActive}" class="badge badge-success">Active</span>
                                    <span th:unless="${u.isActive}" class="badge badge-danger">Inactive</span>
                                </td>
                                <td>
                                    <div class="btn-group">
                                        <a th:href="@{/admin/users/{id}/edit(id=${u.userId})}"
                                           class="btn btn-outline btn-sm">Edit</a>
                                        <form th:action="@{/admin/users/{id}/toggle(id=${u.userId})}"
                                              method="post" style="display:inline;">
                                            <button type="submit"
                                                    th:class="${u.isActive} ? 'btn btn-warning btn-sm' : 'btn btn-success btn-sm'"
                                                    th:text="${u.isActive} ? 'Deactivate' : 'Activate'"></button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div th:if="${totalPages > 1}" class="pagination-wrapper">
                        <!-- Previous -->
                        <a th:if="${currentPage > 0}"
                           th:href="@{/admin/users(page=${currentPage - 1}, keyword=${keyword})}"
                           class="btn btn-outline btn-sm">&laquo; Prev</a>
                        <span th:unless="${currentPage > 0}" class="btn btn-outline btn-sm disabled">&laquo; Prev</span>

                        <!-- Page numbers -->
                        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                                <a th:if="${i != currentPage}"
                                   th:href="@{/admin/users(page=${i}, keyword=${keyword})}"
                                   th:text="${i + 1}"
                                   class="btn btn-outline btn-sm"></a>
                                <strong th:if="${i == currentPage}"
                                        th:text="${i + 1}"
                                        class="btn btn-primary btn-sm" style="pointer-events:none;"></strong>
                            </span>

                        <!-- Next -->
                        <a th:if="${currentPage < totalPages - 1}"
                           th:href="@{/admin/users(page=${currentPage + 1}, keyword=${keyword})}"
                           class="btn btn-outline btn-sm">Next &raquo;</a>
                        <span th:unless="${currentPage < totalPages - 1}" class="btn btn-outline btn-sm disabled">Next &raquo;</span>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
