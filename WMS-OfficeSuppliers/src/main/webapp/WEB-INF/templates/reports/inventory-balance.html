<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Inventory Balance Report - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar-report}"></div>
        <div class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Inventory Balance Report')}"></div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card mb-4">
                    <div class="card-body">
                        <form th:action="@{/reports/inventory-balance}" method="get" class="search-bar"
                            style="align-items:flex-end;">
                            <div class="form-group">
                                <label>From Date</label>
                                <input type="date" name="startDate" th:value="${selectedStartDate}"
                                    class="form-control">
                            </div>
                            <div class="form-group">
                                <label>To Date</label>
                                <input type="date" name="endDate" th:value="${selectedEndDate}" class="form-control">
                            </div>
                            <div style="display:flex; gap:0.5rem; align-self:flex-end; padding-bottom:1rem;">
                                <button type="submit" class="btn btn-primary">Run Report</button>
                                <a th:href="@{/reports/inventory}" class="btn btn-outline">Reset</a>
                            </div>
                            <div class="form-group" style="margin-bottom:0;">
                                <label>Warehouse</label>
                                <div style="display:flex; align-items:center; height:36px;">
                                    <span class="badge badge-info" style="padding: 6px 12px; font-size: 0.875rem;">
                                        [[${currentWarehouse.warehouseName}]]
                                    </span>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Product SKU</th>
                                    <th>Product Name</th>
                                    <th class="text-right">Opening Stock</th>
                                    <th class="text-right">Inbound Qty</th>
                                    <th class="text-right">Outbound Qty</th>
                                    <th class="text-right">Closing Stock</th>
                                    <th>UoM</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="row : ${rows}">
                                    <td><strong th:text="${row.sku}"></strong></td>
                                    <td th:text="${row.productName}"></td>
                                    <td th:text="${row.openingStock}" class="text-right"></td>
                                    <td th:text="${row.inboundQty}" class="text-right text-success"></td>
                                    <td th:text="${row.outboundQty}" class="text-right text-danger"></td>
                                    <td th:text="${row.closingStock}" class="text-right font-weight-bold"
                                        th:style="${row.closingStock < 10} ? 'color: var(--danger-color);' : ''"></td>
                                    <td><span class="badge badge-secondary" th:text="${row.uom}"></span></td>
                                </tr>
                                <tr th:if="${#lists.isEmpty(rows)}">
                                    <td colspan="7" class="text-center">No data available for the selected period.</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
