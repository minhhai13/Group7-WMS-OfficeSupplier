<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sales Orders - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-sales}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Sales Orders')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>
            <div class="card">
                <div class="card-header">
                    <h2>Sales Orders</h2>
                    <a th:href="@{/sales/orders/new}" class="btn btn-primary btn-sm">+ New SO</a>
                </div>
                <div class="card-body">
                    <form th:action="@{/sales/orders}" method="get" class="search-bar">
                        <select name="status" class="form-control" style="max-width: 200px;">
                            <option value="">All Statuses</option>
                            <option value="Draft" th:selected="${selectedStatus == 'Draft'}">Draft</option>
                            <option value="Pending Approval" th:selected="${selectedStatus == 'Pending Approval'}">Pending Approval</option>
                            <option value="Approved" th:selected="${selectedStatus == 'Approved'}">Approved</option>
                            <option value="Incomplete" th:selected="${selectedStatus == 'Incomplete'}">Incomplete</option>
                            <option value="Completed" th:selected="${selectedStatus == 'Completed'}">Completed</option>
                            <option value="Waiting for Stock" th:selected="${selectedStatus == 'Waiting for Stock'}">Waiting for Stock</option>
                            <option value="Rejected" th:selected="${selectedStatus == 'Rejected'}">Rejected</option>
                        </select>
                        <select name="customerId" class="form-control" style="max-width: 220px;">
                            <option value="">All Customers</option>
                            <option th:each="c : ${customers}" th:value="${c.partnerId}" th:text="${c.partnerName}"
                                    th:selected="${selectedCustomerId != null && selectedCustomerId == c.partnerId}"></option>
                        </select>
                        <button type="submit" class="btn btn-outline">Filter</button>
                        <a th:href="@{/sales/orders}" class="btn btn-outline" th:if="${selectedStatus != null || selectedCustomerId != null}">Clear</a>
                    </form>

                    <div th:if="${orderPage.isEmpty()}" class="empty-state">
                        <p>No sales orders found.</p>
                    </div>
                    <div th:unless="${orderPage.isEmpty()}">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                <tr>
                                    <th>#</th>
                                    <th>SO Number</th>
                                    <th>Customer</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="so, iter : ${orderPage.content}">
                                    <td th:text="${(orderPage.number * orderPage.size) + iter.count}"></td>
                                    <td><strong th:text="${so.soNumber}"></strong></td>
                                    <td th:text="${so.customerName} ?: '—'"></td>
                                    <td>
                                        <span th:if="${so.soStatus == 'Pending Approval' || so.soStatus == 'Waiting for Stock'}" class="badge badge-warning" th:text="${so.soStatus}"></span>
                                        <span th:if="${so.soStatus == 'Approved' || so.soStatus == 'Completed'}" class="badge badge-success" th:text="${so.soStatus}"></span>
                                        <span th:if="${so.soStatus == 'Rejected'}" class="badge badge-danger" th:text="${so.soStatus}"></span>
                                        <span th:if="${so.soStatus == 'Draft' || so.soStatus == 'Incomplete'}" class="badge badge-secondary" th:text="${so.soStatus}"></span>
                                    </td>
                                    <td>
                                        <div class="btn-group">
                                            <a th:href="@{/sales/orders/{id}/edit(id=${so.soId})}" class="btn btn-outline btn-sm">View / Edit</a>
                                            <form th:if="${so.soStatus == 'Draft' || so.soStatus == 'Rejected'}"
                                                  th:action="@{/sales/orders/{id}/delete(id=${so.soId})}" method="post" style="display:inline;"
                                                  onsubmit="return confirm('Are you sure you want to delete this SO?');">
                                                <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                                            </form>
                                        </div>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="pagination-container" style="display: flex; justify-content: space-between; align-items: center; margin-top: 15px;">
                            <div class="page-info">
                                Hiển thị trang <span th:text="${orderPage.number + 1}"></span> / <span th:text="${orderPage.totalPages}"></span>
                                (Tổng cộng <span th:text="${orderPage.totalElements}"></span> mục)
                            </div>
                            <div class="pagination" th:if="${orderPage.totalPages > 1}" style="display: flex; gap: 5px;">
                                <a th:class="${orderPage.first ? 'btn btn-outline btn-sm disabled' : 'btn btn-outline btn-sm'}"
                                   th:href="@{/sales/orders(page=${orderPage.number}, status=${selectedStatus}, customerId=${selectedCustomerId})}"
                                   th:style="${orderPage.first ? 'pointer-events:none; opacity:0.5;' : ''}">&laquo; Prev</a>
                                <a th:each="i : ${#numbers.sequence(1, orderPage.totalPages)}"
                                   th:class="${orderPage.number + 1 == i ? 'btn btn-primary btn-sm' : 'btn btn-outline btn-sm'}"
                                   th:href="@{/sales/orders(page=${i}, status=${selectedStatus}, customerId=${selectedCustomerId})}"
                                   th:text="${i}"></a>
                                <a th:class="${orderPage.last ? 'btn btn-outline btn-sm disabled' : 'btn btn-outline btn-sm'}"
                                   th:href="@{/sales/orders(page=${orderPage.number + 2}, status=${selectedStatus}, customerId=${selectedCustomerId})}"
                                   th:style="${orderPage.last ? 'pointer-events:none; opacity:0.5;' : ''}">Next &raquo;</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
