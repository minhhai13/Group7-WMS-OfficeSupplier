<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Internal Transfer - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <th:block th:switch="${loggedInUserRole}">
            <div th:case="'Warehouse Manager'" th:replace="~{fragments/layout :: sidebar-report}"></div>
            <div th:case="'Storekeeper'" th:replace="~{fragments/layout :: sidebar-storekeeper}"></div>
            <div th:case="*" th:replace="~{fragments/layout :: sidebar-storekeeper}"></div>
        </th:block>
        <div class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Internal Transfer')}"></div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card">
                    <div class="card-header">
                        <h2>Chuyển kho nội bộ (Internal Transfer)</h2>
                        <a th:if="${loggedInUserRole == 'Warehouse Manager'}" th:href="@{/transfer/internal/new}"
                            class="btn btn-primary btn-sm">
                            + Tạo phiếu chuyển mới
                        </a>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(transfers)}" class="empty-state">
                            <p>Không có phiếu chuyển kho nào.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(transfers)}" class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>Số phiếu</th>
                                        <th>Kho</th>
                                        <th>Ngày tạo</th>
                                        <th>Trạng thái</th>
                                        <th>Thao tác</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="tn, iter : ${transfers}">
                                        <td th:text="${iter.count}"></td>
                                        <td><strong th:text="${tn.tnNumber}"></strong></td>
                                        <td th:text="${tn.warehouseName}"></td>
                                        <td th:text="${#temporals.format(tn.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                                        <td>
                                            <span th:if="${tn.status == 'Approved'}" class="badge badge-warning"
                                                th:text="${tn.status}"></span>
                                            <span th:if="${tn.status == 'Completed'}" class="badge badge-success"
                                                th:text="${tn.status}"></span>
                                            <span th:if="${tn.status != 'Approved' and tn.status != 'Completed'}"
                                                class="badge badge-secondary" th:text="${tn.status}"></span>
                                        </td>
                                        <td>
                                            <a th:href="@{/transfer/internal/{id}/view(id=${tn.tnId})}"
                                                class="btn btn-outline btn-sm">Chi tiết</a>

                                            <form
                                                th:if="${loggedInUserRole == 'Storekeeper' and tn.status == 'Approved'}"
                                                th:action="@{/transfer/internal/{id}/complete(id=${tn.tnId})}"
                                                method="post" class="d-inline"
                                                onsubmit="return confirm('Xác nhận đã hoàn thành chuyển hàng thực tế?')">
                                                <input type="hidden" th:name="${_csrf.parameterName}"
                                                    th:value="${_csrf.token}" />
                                                <button type="submit" class="btn btn-primary btn-sm">✔ Xác nhận
                                                    chuyển</button>
                                            </form>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
