<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::title}, ~{::section})}">
<head><title>Outbound Movement</title></head>
<body>
<section class="container-fluid">
    <h2 class="mb-4">Outbound Movement Report</h2>
    <div class="card shadow-sm">
        <div class="card-body">
            <table class="table table-striped table-bordered">
                <thead class="table-light">
                <tr>
                    <th>DATE</th>
                    <th>GIN NO</th>
                    <th>SKU</th>
                    <th>PRODUCT NAME</th>
                    <th class="text-end">ISSUED QTY</th>
                    <th>BIN</th>
                    <th>BATCH</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${outboundPage.content}">
                    <td th:text="${#temporals.format(item.outboundDate, 'yyyy-MM-dd HH:mm')}"></td>
                    <td class="text-danger fw-bold" th:text="${item.ginNumber}"></td>
                    <td th:text="${item.skuCode}"></td>
                    <td th:text="${item.productName}"></td>
                    <td class="text-end text-danger fw-bold" th:text="${item.issuedQuantity}"></td>
                    <td th:text="${item.sourceBin}"></td>
                    <td th:text="${item.batchNumber}"></td>
                </tr>
                </tbody>
            </table>

            <div class="d-flex justify-content-between align-items-center mt-3" th:if="${outboundPage.totalPages > 0}">
                <div class="text-muted">Showing [[${outboundPage.number * outboundPage.size + 1}]] to [[${Math.min((outboundPage.number + 1) * outboundPage.size, outboundPage.totalElements)}]] of [[${outboundPage.totalElements}]]</div>
                <nav th:if="${outboundPage.totalPages > 1}">
                    <ul class="pagination mb-0">
                        <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                            <a class="page-link" th:href="@{/wm/reports/outbound(page=${currentPage - 1})}">Previous</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(0, outboundPage.totalPages - 1)}"
                            th:classappend="${currentPage == i} ? 'active'">
                            <a class="page-link" th:href="@{/wm/reports/outbound(page=${i})}" th:text="${i + 1}"></a>
                        </li>
                        <li class="page-item" th:classappend="${currentPage == outboundPage.totalPages - 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/wm/reports/outbound(page=${currentPage + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</section>
</body>
</html>
