<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${trDTO.toId != null} ? 'Edit Transfer Order - WMS' : 'New Transfer Order - WMS'">TO Form - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar-report}"></div>
        <div class="main-content">
            <div th:replace="~{fragments/layout :: topbar(${trDTO.toId != null} ? 'Edit Transfer Order' : 'New Transfer Order')}"></div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <!-- Reject Reason Alert -->
                <div th:if="${trDTO.status == 'Rejected' && trDTO.rejectReason != null}"
                     class="alert alert-danger" style="margin-bottom: 1.5rem;">
                    <strong>⚠️ This Transfer Order was rejected.</strong><br>
                    <strong>Reason:</strong> <span th:text="${trDTO.rejectReason}"></span>
                </div>

                <form th:action="@{/transfer/requests/save}" method="post" th:object="${trDTO}" id="toForm">
                    <input type="hidden" th:field="*{toId}">
                    <input type="hidden" th:field="*{destinationWarehouseId}">

                    <!-- Header Information -->
                    <div class="card" style="margin-bottom: 1.5rem;">
                        <div class="card-header">
                            <h2>Transfer Order Information</h2>
                            <span th:if="${trDTO.status != null}" class="badge"
                                  th:classappend="${trDTO.status == 'Pending'} ? 'badge-warning' :
                                                  (${trDTO.status == 'Approved'} ? 'badge-info' :
                                                  (${trDTO.status == 'Completed'} ? 'badge-success' :
                                                  (${trDTO.status == 'Rejected'} ? 'badge-danger' : 'badge-secondary')))"
                                  th:text="${trDTO.status}">
                            </span>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                                <!-- TO Number -->
                                <div class="form-group">
                                    <label>TO Number</label>
                                    <input type="text" class="form-control"
                                           th:value="${trDTO.toNumber != null} ? ${trDTO.toNumber} : 'Auto-generated'"
                                           readonly disabled>
                                </div>
                                <!-- Source Warehouse -->
                                <div class="form-group">
                                    <label for="sourceWarehouseId">Source Warehouse <span style="color:red;">*</span></label>
                                    <select id="sourceWarehouseId" th:field="*{sourceWarehouseId}" class="form-control"
                                            th:disabled="${trDTO.status != null && trDTO.status != 'Draft' && trDTO.status != 'Rejected'}">
                                        <option value="">-- Select Source Warehouse --</option>
                                        <option th:each="wh : ${sourceWarehouses}"
                                                th:value="${wh.warehouseId}"
                                                th:text="${wh.warehouseName}">
                                        </option>
                                    </select>
                                </div>
                                <!-- Destination Warehouse (read-only, current user's WH) -->
                                <div class="form-group">
                                    <label>Destination Warehouse</label>
                                    <input type="text" class="form-control"
                                           th:value="${trDTO.destinationWarehouseName}" readonly disabled>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Product Lines -->
                    <div class="card" style="margin-bottom: 1.5rem;">
                        <div class="card-header">
                            <h2>Product Lines</h2>
                            <button type="button" class="btn btn-primary btn-sm" onclick="addLine()"
                                    th:if="${trDTO.status == null || trDTO.status == 'Draft' || trDTO.status == 'Rejected'}"
                                    id="addLineBtn">+ Add Product Line</button>
                        </div>
                        <div class="card-body">
                            <div class="table-wrapper">
                                <table id="linesTable">
                                    <thead>
                                        <tr>
                                            <th style="width:5%;">#</th>
                                            <th style="width:40%;">Product</th>
                                            <th style="width:25%;">UoM</th>
                                            <th style="width:20%;">Requested Qty</th>
                                            <th style="width:10%;">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="linesBody">
                                        <tr th:each="detail, iter : ${trDTO.details}" th:with="idx=${iter.index}">
                                            <td class="line-number" th:text="${iter.count}"></td>
                                            <td>
                                                <input type="hidden" th:name="'details[' + ${idx} + '].toDetailId'"
                                                       th:value="${detail.toDetailId}">
                                                <select th:name="'details[' + ${idx} + '].productId'"
                                                        class="form-control product-select"
                                                        th:attr="data-index=${idx}"
                                                        onchange="onProductChange(this)"
                                                        th:disabled="${trDTO.status != null && trDTO.status != 'Draft' && trDTO.status != 'Rejected'}">
                                                    <option value="">-- Select Product --</option>
                                                    <option th:each="p : ${products}"
                                                            th:value="${p.productId}"
                                                            th:text="${p.sku + ' - ' + p.productName}"
                                                            th:selected="${detail.productId != null && detail.productId == p.productId}">
                                                    </option>
                                                </select>
                                            </td>
                                            <td>
                                                <select th:name="'details[' + ${idx} + '].uom'"
                                                        class="form-control uom-select"
                                                        th:id="'uom-' + ${idx}"
                                                        th:disabled="${trDTO.status != null && trDTO.status != 'Draft' && trDTO.status != 'Rejected'}">
                                                    <option value="">-- Select UoM --</option>
                                                    <option th:if="${detail.uom != null}" th:value="${detail.uom}"
                                                            th:text="${detail.uom}" selected></option>
                                                </select>
                                            </td>
                                            <td>
                                                <input type="number"
                                                       th:name="'details[' + ${idx} + '].requestedQty'"
                                                       class="form-control"
                                                       th:value="${detail.requestedQty}"
                                                       min="1"
                                                       th:readonly="${trDTO.status != null && trDTO.status != 'Draft' && trDTO.status != 'Rejected'}">
                                            </td>
                                            <td>
                                                <button type="button" class="btn btn-danger btn-sm"
                                                        onclick="removeLine(this)"
                                                        th:if="${trDTO.status == null || trDTO.status == 'Draft' || trDTO.status == 'Rejected'}">✕</button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="card" th:if="${trDTO.status == null || trDTO.status == 'Draft' || trDTO.status == 'Rejected'}">
                        <div class="card-body" style="display: flex; gap: 1rem; justify-content: flex-end;">
                            <a th:href="@{/transfer/requests}" class="btn btn-outline">Cancel</a>
                            <button type="submit" name="action" value="draft" class="btn btn-outline">Save Draft</button>
                            <button type="submit" name="action" value="submit" class="btn btn-primary"
                                    onclick="return confirm('Submit this Transfer Order for approval?');">
                                Submit for Approval
                            </button>
                        </div>
                    </div>
                    <div class="card" th:if="${trDTO.status != null && trDTO.status != 'Draft' && trDTO.status != 'Rejected'}">
                        <div class="card-body" style="display: flex; gap: 1rem; justify-content: flex-end;">
                            <a th:href="@{/transfer/requests}" class="btn btn-outline">Back to List</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        var products = /*[[${products}]]*/[];
        var contextPath = /*[[@{/}]]*/ '/';
        var lineIndex = /*[[${trDTO.details != null ? trDTO.details.size() : 0}]]*/ 0;

        if (contextPath.endsWith('/')) {
            contextPath = contextPath.substring(0, contextPath.length - 1);
        }

        function addLine() {
            var tbody = document.getElementById('linesBody');
            var idx = lineIndex++;
            var tr = document.createElement('tr');

            var productOptions = '<option value="">-- Select Product --</option>';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                productOptions += '<option value="' + p.productId + '">' + p.sku + ' - ' + p.productName + '</option>';
            }

            tr.innerHTML =
                '<td class="line-number">' + (tbody.rows.length + 1) + '</td>' +
                '<td><select name="details[' + idx + '].productId" class="form-control product-select" data-index="' + idx + '" onchange="onProductChange(this)">' +
                productOptions + '</select></td>' +
                '<td><select name="details[' + idx + '].uom" id="uom-' + idx + '" class="form-control uom-select">' +
                '<option value="">-- Select UoM --</option></select></td>' +
                '<td><input type="number" name="details[' + idx + '].requestedQty" class="form-control" min="1" placeholder="Qty"></td>' +
                '<td><button type="button" class="btn btn-danger btn-sm" onclick="removeLine(this)">✕</button></td>';

            tbody.appendChild(tr);
            renumberLines();
        }

        function removeLine(btn) {
            btn.closest('tr').remove();
            renumberLines();
        }

        function renumberLines() {
            var rows = document.querySelectorAll('#linesBody tr');
            for (var i = 0; i < rows.length; i++) {
                rows[i].querySelector('.line-number').textContent = (i + 1);
            }
        }

        function onProductChange(selectEl) {
            var productId = selectEl.value;
            var idx = selectEl.getAttribute('data-index');
            var uomSelect = document.getElementById('uom-' + idx);
            uomSelect.innerHTML = '<option value="">-- Select UoM --</option>';
            if (!productId) return;
            fetch(contextPath + '/api/products/' + productId + '/uoms')
                .then(function(r) { return r.json(); })
                .then(function(uoms) {
                    for (var i = 0; i < uoms.length; i++) {
                        var opt = document.createElement('option');
                        opt.value = uoms[i].uom;
                        opt.textContent = uoms[i].display || uoms[i].label || uoms[i].uom;
                        uomSelect.appendChild(opt);
                    }
                })
                .catch(function(err) { console.error('Error loading UoMs:', err); });
        }

        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.product-select').forEach(function(sel) {
                if (sel.value) {
                    var idx = sel.getAttribute('data-index');
                    var uomSelect = document.getElementById('uom-' + idx);
                    var currentUom = uomSelect.value;
                    fetch(contextPath + '/api/products/' + sel.value + '/uoms')
                        .then(function(r) { return r.json(); })
                        .then(function(uoms) {
                            uomSelect.innerHTML = '<option value="">-- Select UoM --</option>';
                            for (var i = 0; i < uoms.length; i++) {
                                var opt = document.createElement('option');
                                opt.value = uoms[i].uom;
                                opt.textContent = uoms[i].display || uoms[i].label || uoms[i].uom;
                                if (uoms[i].uom === currentUom) opt.selected = true;
                                uomSelect.appendChild(opt);
                            }
                        })
                        .catch(function(err) { console.error('Error loading UoMs:', err); });
                }
            });
        });
        /*]]>*/
    </script>
</body>

</html>
