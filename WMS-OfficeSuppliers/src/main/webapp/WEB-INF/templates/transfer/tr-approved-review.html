<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Review Transfer Request - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-report}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Review Transfer Request')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <!-- Reject reason -->
            <div th:if="${trDTO.trStatus == 'Rejected' && trDTO.rejectReason != null}"
                 class="alert alert-danger" style="margin-bottom: 1.5rem;">
                <strong>Lý do từ chối:</strong>
                <span th:text="${trDTO.rejectReason}"></span>
            </div>

            <!-- Header info -->
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card-header">
                    <h2>Thông tin phiếu chuyển kho</h2>

                    <span th:if="${trDTO.trStatus == 'Pending'}"
                          class="badge badge-warning"
                          th:text="${trDTO.trStatus}"></span>

                    <span th:if="${trDTO.trStatus == 'Approved'}"
                          class="badge badge-success"
                          th:text="${trDTO.trStatus}"></span>

                    <span th:if="${trDTO.trStatus == 'In-Transit'}"
                          class="badge badge-info"
                          th:text="${trDTO.trStatus}"></span>

                    <span th:if="${trDTO.trStatus == 'Completed'}"
                          class="badge badge-success"
                          th:text="${trDTO.trStatus}"></span>
                </div>

                <div class="card-body">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label>Mã phiếu chuyển</label>
                            <input type="text" class="form-control"
                                   th:value="${trDTO.transferNumber}"
                                   readonly disabled>
                        </div>

                        <div class="form-group">
                            <label>Kho xuất (Nguồn)</label>
                            <input type="text" class="form-control"
                                   th:value="${trDTO.sourceWarehouseName}"
                                   readonly disabled>
                        </div>

                        <div class="form-group">
                            <label>Kho nhập (Đích)</label>
                            <input type="text" class="form-control"
                                   th:value="${trDTO.destinationWarehouseName}"
                                   readonly disabled>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Details -->
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card-header">
                    <h2>Danh sách sản phẩm chuyển</h2>
                </div>
                <div class="card-body">
                    <div class="table-wrapper">
                        <table>
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Sản phẩm</th>
                                <th>Đơn vị tính</th>
                                <th>Số lượng yêu cầu</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="detail, iter : ${trDTO.details}">
                                <td th:text="${iter.count}"></td>
                                <td th:text="${detail.productDisplayName}"></td>
                                <td th:text="${detail.uom}"></td>
                                <td th:text="${detail.transferQty}"></td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="card">
                <div class="card-body"
                     style="display: flex; gap: 1rem; justify-content: flex-end; align-items: flex-start;">

                    <a th:href="@{/transfer/approvals}"
                       class="btn btn-outline">Quay lại danh sách</a>

                    <th:block th:if="${trDTO.trStatus == 'Pending'}">

                        <form th:action="@{/transfer/approvals/{id}/approve(id=${trDTO.trId})}"
                              method="post"
                              style="display:inline;"
                              onsubmit="return confirm('Xác nhận PHÊ DUYỆT yêu cầu chuyển kho này?');">
                            <button type="submit" class="btn btn-primary">
                                ✅ Phê duyệt
                            </button>
                        </form>

                        <div id="rejectSection"
                             style="display: none; border: 1px solid #ef4444; border-radius: 8px; padding: 1rem; max-width: 400px;">

                            <form th:action="@{/transfer/approvals/{id}/reject(id=${trDTO.trId})}"
                                  method="post"
                                  onsubmit="return validateRejectReason();">

                                <div class="form-group" style="margin-bottom: 0.75rem;">
                                    <label for="reason"
                                           style="font-weight: 600; color: #ef4444;">
                                        Lý do từ chối <span style="color:red;">*</span>
                                    </label>

                                    <textarea id="reason"
                                              name="reason"
                                              class="form-control"
                                              rows="3"
                                              required></textarea>
                                </div>

                                <div style="display: flex; gap: 0.5rem; justify-content: flex-end;">
                                    <button type="button"
                                            class="btn btn-outline btn-sm"
                                            onclick="toggleReject()">Hủy</button>

                                    <button type="submit"
                                            class="btn btn-danger btn-sm">
                                        Xác nhận từ chối
                                    </button>
                                </div>
                            </form>
                        </div>

                        <button type="button"
                                class="btn btn-danger"
                                id="rejectToggleBtn"
                                onclick="toggleReject()">❌ Từ chối</button>

                    </th:block>
                </div>
            </div>

        </div>
    </div>
</div>

<script>
    function toggleReject() {
        var section = document.getElementById('rejectSection');
        var btn = document.getElementById('rejectToggleBtn');
        if (section.style.display === 'none') {
            section.style.display = 'block';
            btn.style.display = 'none';
        } else {
            section.style.display = 'none';
            btn.style.display = 'inline-block';
        }
    }

    function validateRejectReason() {
        var reason = document.getElementById('reason').value.trim();
        if (!reason) {
            alert('Please enter a rejection reason.');
            return false;
        }
        return confirm('Are you sure you want to REJECT this Transfer Request?');
    }
</script>

</body>
</html>
