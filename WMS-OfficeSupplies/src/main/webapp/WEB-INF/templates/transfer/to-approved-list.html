<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>TO Approvals - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar-report}"></div>
        <div class="main-content">
            <div th:replace="~{fragments/layout :: topbar('TO Approvals')}"></div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card">
                    <div class="card-header">
                        <h2>Transfer Order Approvals</h2>
                        <small style="color: #6b7280;">Incoming transfer requests targeting this warehouse as source</small>
                    </div>
                    <div class="card-body">
                        <!-- Filter Bar -->
                        <form th:action="@{/transfer/approvals}" method="get" class="search-bar">
                            <select name="status" class="form-control" style="max-width: 200px;">
                                <option value="All" th:selected="${selectedStatus == 'All'}">All Statuses</option>
                                <option value="Pending" th:selected="${selectedStatus == 'Pending'}">Pending</option>
                                <option value="Approved" th:selected="${selectedStatus == 'Approved'}">Approved</option>
                                <option value="In-Transit" th:selected="${selectedStatus == 'In-Transit'}">In-Transit</option>
                                <option value="Completed" th:selected="${selectedStatus == 'Completed'}">Completed</option>
                                <option value="Incomplete" th:selected="${selectedStatus == 'Incomplete'}">Incomplete</option>
                                <option value="Rejected" th:selected="${selectedStatus == 'Rejected'}">Rejected</option>
                            </select>
                            <select name="destWarehouseId" class="form-control" style="max-width: 220px;">
                                <option value="">All Destination Warehouses</option>
                                <option th:each="wh : ${destWarehouses}"
                                        th:value="${wh.warehouseId}"
                                        th:text="${wh.warehouseName}"
                                        th:selected="${selectedDestId != null && selectedDestId == wh.warehouseId}">
                                </option>
                            </select>
                            <button type="submit" class="btn btn-outline">Filter</button>
                            <a th:href="@{/transfer/approvals}" class="btn btn-outline">Reset</a>
                        </form>

                        <div th:if="${#lists.isEmpty(transfers)}" class="empty-state">
                            <p>No transfer orders found.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(transfers)}" class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>TO Number</th>
                                        <th>Destination Warehouse</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="to, iter : ${transfers}">
                                        <td th:text="${iter.count}"></td>
                                        <td><strong th:text="${to.toNumber}"></strong></td>
                                        <td th:text="${to.destinationWarehouseName}"></td>
                                        <td>
                                            <span th:if="${to.status == 'Pending'}" class="badge badge-warning" th:text="${to.status}"></span>
                                            <span th:if="${to.status == 'Approved'}" class="badge badge-info" th:text="${to.status}"></span>
                                            <span th:if="${to.status == 'In-Transit'}" class="badge badge-warning" th:text="${to.status}"></span>
                                            <span th:if="${to.status == 'Incomplete'}" class="badge badge-success" th:text="${to.status}"></span>
                                            <span th:if="${to.status == 'Completed'}" class="badge badge-success" th:text="${to.status}"></span>
                                            <span th:if="${to.status == 'Rejected'}" class="badge badge-danger" th:text="${to.status}"></span>
                                        </td>
                                        <td>
                                            <a th:href="@{/transfer/approvals/{id}/review(id=${to.toId})}"
                                               class="btn btn-outline btn-sm">Review</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
