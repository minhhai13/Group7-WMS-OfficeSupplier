<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Access Denied - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="login-wrapper">
    <div class="login-card" style="text-align:center;">
        <h1 style="font-size:3rem;margin-bottom:.5rem;">🚫</h1>
        <h1>403 - Access Denied</h1>
        <p class="subtitle" th:text="${error != null} ? ${error} : 'You do not have permission to access this page.'"></p>
        <a th:href="@{/logout}" class="btn btn-primary" style="margin-top:1rem;">Go Back</a>
    </div>
</div>
</body>

</html>
