<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-admin}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Admin Dashboard')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon blue">🏭</div>
                    <div class="stat-info">
                        <h3 th:text="${warehouseCount}">0</h3>
                        <p>Total Warehouses</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon green">👥</div>
                    <div class="stat-info">
                        <h3 th:text="${userCount}">0</h3>
                        <p>Total Users</p>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h2>Quick Actions</h2>
                </div>
                <div class="card-body">
                    <div class="btn-group">
                        <a th:href="@{/admin/warehouses/new}" class="btn btn-primary">+ New Warehouse</a>
                        <a th:href="@{/admin/users/new}" class="btn btn-success">+ New User</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
