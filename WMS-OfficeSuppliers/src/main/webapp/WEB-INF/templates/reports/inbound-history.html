<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inbound History - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-report}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Inbound History')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card mb-4">
                <div class="card-body">
                    <form th:action="@{/reports/inbound}" method="get" class="search-bar">
                        <div class="form-group">
                            <label>From Date</label>
                            <input type="date" name="startDate" th:value="${selectedStartDate}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>To Date</label>
                            <input type="date" name="endDate" th:value="${selectedEndDate}" class="form-control">
                        </div>
                        <div class="form-group">
                            <label>Product</label>
                            <select name="productId" class="form-control">
                                <option value="">-- All Products --</option>
                                <option th:each="p : ${products}" th:value="${p.productId}"
                                        th:text="${p.productName}" th:selected="${p.productId == selectedProductId}"></option>
                            </select>
                        </div>
                        <div style="display:flex; gap:0.5rem; align-items:flex-end;">
                            <button type="submit" class="btn btn-primary">Filter</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card">
                <div class="table-wrapper">
                    <table>
                        <thead>
                        <tr>
                            <th>Date</th>
                            <th>SKU</th>
                            <th>Product Name</th>
                            <th>Batch</th>
                            <th>Bin</th>
                            <th class="text-right">Qty</th>
                            <th>UoM</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="row : ${rows}">
                            <td th:text="${#temporals.format(row.movementDate, 'dd/MM/yyyy HH:mm')}"></td>
                            <td><strong th:text="${row.sku}"></strong></td>
                            <td th:text="${row.productName}"></td>
                            <td th:text="${row.batchNumber}"></td>
                            <td th:text="${row.binLocation}"></td>
                            <td th:text="${row.quantity}" class="text-right text-success"></td>
                            <td><span class="badge badge-secondary" th:text="${row.uom}"></span></td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="card-footer" th:if="${resultPage.totalPages > 1}">
                    <div class="pagination">
                        <a th:if="${!resultPage.first}"
                           th:href="@{/reports/inbound(page=${resultPage.number - 1}, startDate=${selectedStartDate}, endDate=${selectedEndDate}, productId=${selectedProductId})}"
                           class="btn btn-outline btn-sm">Previous</a>
                        <span class="page-info">Page [[${resultPage.number + 1}]] of [[${resultPage.totalPages}]]</span>
                        <a th:if="${!resultPage.last}"
                           th:href="@{/reports/inbound(page=${resultPage.number + 1}, startDate=${selectedStartDate}, endDate=${selectedEndDate}, productId=${selectedProductId})}"
                           class="btn btn-outline btn-sm">Next</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
