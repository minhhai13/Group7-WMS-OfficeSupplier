<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Purchase Orders - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <style>
        .filter-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: sidebar-purchasing}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Purchase Orders')}"></div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card">
            <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                <h2>PO List</h2>
                <a th:href="@{/purchasing/po-form}" class="btn btn-primary">➕ Create New PO</a>
            </div>

            <div class="card-body">
                <form class="filter-bar" th:action="@{/purchasing/po-list}" method="get">
                    <div>
                        <label for="status">Filter by Status:</label>
                        <select name="status" id="status" class="form-control"
                            style="width: 200px; display: inline-block;">
                            <option value="">All</option>
                            <option value="Draft" th:selected="${statusFilter == 'Draft'}">Draft</option>
                            <option value="Pending Approval" th:selected="${statusFilter == 'Pending Approval'}">Pending
                                Approval</option>
                            <option value="Approved" th:selected="${statusFilter == 'Approved'}">Approved</option>
                            <option value="Rejected" th:selected="${statusFilter == 'Rejected'}">Rejected</option>
                            <option value="Incomplete" th:selected="${statusFilter == 'Incomplete'}">Incomplete</option>
                            <option value="Completed" th:selected="${statusFilter == 'Completed'}">Completed</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary">Filter</button>
                    <a th:href="@{/purchasing/po-list}" class="btn btn-secondary">Clear</a>
                </form>

                <table class="table">
                    <thead>
                        <tr>
                            <th>PO ID</th>
                            <th>PO Number</th>
                            <th>Supplier</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="po : ${pos}">
                            <td th:text="${po.poId}"></td>
                            <td th:text="${po.poNumber}"></td>
                            <td th:text="${po.supplier.partnerName}"></td>
                            <td>
                                <span th:class="'badge ' + (${po.poStatus == 'Draft'} ? 'bg-secondary' : 
                                               (${po.poStatus == 'Pending Approval'} ? 'bg-warning' : 
                                               (${po.poStatus == 'Approved'} ? 'bg-primary' : 
                                               (${po.poStatus == 'Completed'} ? 'bg-success' : 'bg-danger'))))"
                                    th:text="${po.poStatus}">
                                </span>
                            </td>
                            <td>
                                <a th:href="@{/purchasing/po-form(id=${po.poId})}"
                                    class="btn btn-sm btn-primary">View/Edit</a>
                                <form th:if="${po.poStatus == 'Draft' or po.poStatus == 'Rejected'}"
                                    th:action="@{/purchasing/po-delete/{id}(id=${po.poId})}" method="post"
                                    style="display:inline;">
                                    <button type="submit" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Are you sure you want to delete this PO?');">Delete</button>
                                </form>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(pos)}">
                            <td colspan="5" class="text-center">No Purchase Orders found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</body>

</html>
