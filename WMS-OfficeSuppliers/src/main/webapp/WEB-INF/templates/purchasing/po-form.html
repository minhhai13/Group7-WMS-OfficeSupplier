<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PO Form - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <script th:src="@{https://code.jquery.com/jquery-3.6.0.min.js}"></script>
    <style>
        .table-input {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }

        .readonly-input {
            background-color: #e9ecef;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: sidebar-purchasing}"></div>

    <div class="main-content">
        <div
            th:replace="~{fragments/layout :: topbar(${poDTO.poId == null ? 'Create Purchase Order' : 'Edit PO: ' + poDTO.poNumber})}">
        </div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div th:if="${#fields.hasErrors('${poDTO.*}')}" class="alert alert-danger">
            <ul>
                <li th:each="err : ${#fields.errors('${poDTO.*}')}" th:text="${err}"></li>
            </ul>
        </div>

        <div class="card">
            <div class="card-body">
                <form id="poForm" th:action="@{/purchasing/po-save}" th:object="${poDTO}" method="post">
                    <input type="hidden" th:field="*{poId}">
                    <input type="hidden" th:field="*{poNumber}">
                    <input type="hidden" th:field="*{poStatus}">

                    <div class="form-group" style="width: 50%;">
                        <label for="supplierId">Supplier <span style="color:red">*</span></label>
                        <select id="supplierId" th:field="*{supplierId}" class="form-control"
                            th:disabled="*{poStatus != 'Draft' and poStatus != 'Rejected'}">
                            <option value="">-- Select Supplier --</option>
                            <option th:each="s : ${suppliers}" th:value="${s.partnerId}" th:text="${s.partnerName}">
                            </option>
                        </select>
                        <span class="text-danger" th:if="${#fields.hasErrors('supplierId')}"
                            th:errors="*{supplierId}"></span>
                        <!-- Hidden input to keep value if disabled -->
                        <input type="hidden" th:if="*{poStatus != 'Draft' and poStatus != 'Rejected'}"
                            th:field="*{supplierId}">
                    </div>

                    <h4 class="mt-4">Order Lines</h4>
                    <table class="table" id="detailsTable">
                        <thead>
                            <tr>
                                <th style="width: 40%">Product <span style="color:red">*</span></th>
                                <th style="width: 20%">UoM <span style="color:red">*</span></th>
                                <th style="width: 20%">Quantity <span style="color:red">*</span></th>
                                <th style="width: 10%">Received</th>
                                <th style="width: 10%">Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detail, stat : *{details}" class="detail-row">
                                <input type="hidden" th:field="*{details[__${stat.index}__].poDetailId}">
                                <input type="hidden" class="hidden-uom" th:value="${detail.uom}">

                                <td>
                                    <select th:field="*{details[__${stat.index}__].productId}"
                                        class="table-input product-select"
                                        th:disabled="*{poStatus != 'Draft' and poStatus != 'Rejected'}">
                                        <option value="">-- Select Product --</option>
                                        <option th:each="p : ${products}" th:value="${p.productId}"
                                            th:text="${p.sku + ' - ' + p.productName}" th:data-sku="${p.sku}"></option>
                                    </select>
                                    <input type="hidden" th:if="*{poStatus != 'Draft' and poStatus != 'Rejected'}"
                                        th:field="*{details[__${stat.index}__].productId}">
                                </td>
                                <td>
                                    <select th:field="*{details[__${stat.index}__].uom}" class="table-input uom-select"
                                        th:disabled="*{poStatus != 'Draft' and poStatus != 'Rejected'}">
                                        <!-- Will be populated by JS -->
                                        <option value="" th:if="${detail.uom == null}">-- Select --</option>
                                        <option th:if="${detail.uom != null}" th:value="${detail.uom}"
                                            th:text="${detail.uom}" selected></option>
                                    </select>
                                    <input type="hidden" th:if="*{poStatus != 'Draft' and poStatus != 'Rejected'}"
                                        th:field="*{details[__${stat.index}__].uom}">
                                </td>
                                <td>
                                    <input type="number" th:field="*{details[__${stat.index}__].orderedQty}"
                                        class="table-input" min="1"
                                        th:readonly="*{poStatus != 'Draft' and poStatus != 'Rejected'}"
                                        th:classappend="*{poStatus != 'Draft' and poStatus != 'Rejected'} ? 'readonly-input' : ''">
                                </td>
                                <td>
                                    <input type="number" th:field="*{details[__${stat.index}__].receivedQty}"
                                        class="table-input readonly-input" readonly>
                                </td>
                                <td>
                                    <button type="button" class="btn btn-sm btn-danger delete-btn"
                                        th:if="*{poStatus == 'Draft' or poStatus == 'Rejected'}">🗑️</button>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <button type="button" class="btn btn-secondary mt-2 mb-4" id="addRowBtn"
                        th:if="*{poStatus == 'Draft' or poStatus == 'Rejected'}">➕ Add Product Line</button>

                    <div class="form-group mt-4">
                        <th:block th:if="*{poStatus == 'Draft' or poStatus == 'Rejected'}">
                            <button type="submit" name="action" value="draft" class="btn btn-primary">Save
                                Draft</button>
                            <button type="submit" name="action" value="submit" class="btn btn-success"
                                onclick="return confirm('Are you sure you want to submit this PO for approval?');">Submit
                                for Approval</button>
                        </th:block>
                        <a th:href="@{/purchasing/po-list}" class="btn btn-secondary">Back to List</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        $(document).ready(function () {
            var contextPath = /*[[@{/}]]*/ '';
            if (contextPath === '/') contextPath = '';

            // Handle UoM loading when Product changes
            $(document).on('change', '.product-select', function () {
                var select = $(this);
                var productId = select.val();
                var uomSelect = select.closest('tr').find('.uom-select');

                uomSelect.empty().append('<option value="">-- Select --</option>');

                if (productId) {
                    $.get(contextPath + '/api/purchasing/products/' + productId + '/uoms', function (data) {
                        data.forEach(function (uom) {
                            uomSelect.append($('<option></option>').val(uom).text(uom));
                        });
                    }).fail(function () {
                        alert('Could not load UoMs for this product.');
                    });
                }
            });

            // If editing an existing form with errors or just opening, trigger change to load UoMs for existing selected products
            // Wait, we already pre-selected UoMs from backend on initial load if present in model.
            // When editing, if we just trigger change, we lose the selected UoM.
            // So we write a manual init script for rows that have a product selected but need the full UoM list.
            $('.detail-row').each(function () {
                var row = $(this);
                var select = row.find('.product-select');
                var productId = select.val();
                var uomSelect = row.find('.uom-select');
                var existingUom = row.find('.hidden-uom').val();

                if (productId && uomSelect.is(':enabled')) {
                    $.get(contextPath + '/api/purchasing/products/' + productId + '/uoms', function (data) {
                        uomSelect.empty().append('<option value="">-- Select --</option>');
                        data.forEach(function (uom) {
                            var option = $('<option></option>').val(uom).text(uom);
                            if (uom === existingUom) {
                                option.prop('selected', true);
                            }
                            uomSelect.append(option);
                        });
                    });
                }
            });

            // Handle add row
            $('#addRowBtn').click(function () {
                var tbody = $('#detailsTable tbody');
                var index = tbody.find('tr').length;

                var newRow = `
                    <tr class="detail-row">
                        <input type="hidden" id="details${index}.poDetailId" name="details[${index}].poDetailId" value="">
                        <input type="hidden" class="hidden-uom" value="">
                        <td>
                            <select id="details${index}.productId" name="details[${index}].productId" class="table-input product-select">
                                <option value="">-- Select Product --</option>
                                ` + getProductsOptions() + `
                            </select>
                        </td>
                        <td>
                            <select id="details${index}.uom" name="details[${index}].uom" class="table-input uom-select">
                                <option value="">-- Select --</option>
                            </select>
                        </td>
                        <td>
                            <input type="number" id="details${index}.orderedQty" name="details[${index}].orderedQty" class="table-input" min="1" value="1">
                        </td>
                        <td>
                            <input type="number" id="details${index}.receivedQty" name="details[${index}].receivedQty" class="table-input readonly-input" readonly value="0">
                        </td>
                        <td>
                            <button type="button" class="btn btn-sm btn-danger delete-btn">🗑️</button>
                        </td>
                    </tr>
                `;
                tbody.append(newRow);
            });

            // Handle delete row
            $(document).on('click', '.delete-btn', function () {
                if ($('#detailsTable tbody tr').length > 1) {
                    $(this).closest('tr').remove();
                    // Optional: re-index name attributes here if Spring MVC validation binding has issues 
                    // with missing indices. Usually Spring can handle sparse indices in some configurations, 
                    // but to be safe, we re-index.
                    reindexRows();
                } else {
                    alert('You must have at least one product line.');
                }
            });

            function getProductsOptions() {
                var options = '';
                var productsData = /*[[${products}]]*/[];
                productsData.forEach(function (p) {
                    options += '<option value="' + p.productId + '" data-sku="' + p.sku + '">' + p.sku + ' - ' + p.productName + '</option>';
                });
                return options;
            }

            function reindexRows() {
                $('#detailsTable tbody tr').each(function (index) {
                    var row = $(this);
                    row.find('input, select').each(function () {
                        var name = $(this).attr('name');
                        if (name) {
                            var newName = name.replace(/details\[\d+\]/, 'details[' + index + ']');
                            $(this).attr('name', newName);
                        }
                        var id = $(this).attr('id');
                        if (id) {
                            var newId = id.replace(/details\d+/, 'details' + index);
                            $(this).attr('id', newId);
                        }
                    });
                });
            }
        });
    </script>
</body>

</html>
