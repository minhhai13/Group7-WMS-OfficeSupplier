<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Goods Issue Notes - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar-storekeeper}"></div>
        <div class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Goods Issue')}"></div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card">
                    <div class="card-header">
                        <h2>Goods Issue Notes</h2>
                    </div>
                    <div class="card-body">
                        <!-- Filter Bar -->
                        <form th:action="@{/storekeeper/gin}" method="get" class="search-bar">
                            <select name="status" class="form-control" style="max-width: 200px;">
                                <option value="All" th:selected="${selectedStatus == 'All'}">All Statuses</option>
                                <option value="Draft" th:selected="${selectedStatus == 'Draft'}">Draft</option>
                                <option value="Posted" th:selected="${selectedStatus == 'Posted'}">Posted</option>
                            </select>
                            <button type="submit" class="btn btn-outline">Filter</button>
                            <a th:href="@{/storekeeper/gin}" class="btn btn-outline">Reset</a>
                        </form>

                        <div th:if="${#lists.isEmpty(gins)}" class="empty-state">
                            <p>No goods issue notes found.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(gins)}" class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>GIN Number</th>
                                        <th>SO Number</th>
                                        <th>Customer</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="gin, iter : ${gins}">
                                        <td th:text="${iter.count}"></td>
                                        <td><strong th:text="${gin.ginNumber}"></strong></td>
                                        <td th:text="${gin.soNumber}"></td>
                                        <td th:text="${gin.customerName} ?: '—'"></td>
                                        <td>
                                            <span th:if="${gin.giStatus == 'Draft'}" class="badge badge-warning"
                                                th:text="${gin.giStatus}"></span>
                                            <span th:if="${gin.giStatus == 'Posted'}" class="badge badge-success"
                                                th:text="${gin.giStatus}"></span>
                                        </td>
                                        <td>
                                            <a th:if="${gin.giStatus == 'Draft'}"
                                                th:href="@{/storekeeper/gin/{id}/issue(id=${gin.ginId})}"
                                                class="btn btn-primary btn-sm">📤 Issue Goods</a>
                                            <a th:if="${gin.giStatus == 'Posted'}"
                                                th:href="@{/storekeeper/gin/{id}/issue(id=${gin.ginId})}"
                                                class="btn btn-outline btn-sm">View</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
