<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>TR Approvals - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-report}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('TR Approvals')}"></div>

        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header">
                    <h2>Transfer Request Approvals</h2>
                </div>

                <div class="card-body">

                    <!-- FILTER -->
                    <form th:action="@{/transfer/approvals}" method="get" class="search-bar">

                        <select name="status" class="form-control" style="max-width: 200px;">
                            <option value="All" th:selected="${selectedStatus == 'All'}">All Statuses</option>
                            <option value="Pending" th:selected="${selectedStatus == 'Pending'}">Pending</option>
                            <option value="Approved" th:selected="${selectedStatus == 'Approved'}">Approved</option>
                            <option value="In-Transit" th:selected="${selectedStatus == 'In-Transit'}">In-Transit</option>
                            <option value="Completed" th:selected="${selectedStatus == 'Completed'}">Completed</option>
                            <option value="Rejected" th:selected="${selectedStatus == 'Rejected'}">Rejected</option>
                        </select>

                        <!-- DESTINATION FILTER -->
                        <select name="destWarehouseId"
                                class="form-control"
                                style="max-width: 220px;">
                            <option value="">All Destination Warehouses</option>
                            <option th:each="w : ${sourceWarehouses}"
                                    th:value="${w.warehouseId}"
                                    th:text="${w.warehouseName}"
                                    th:selected="${selectedDestId != null && selectedDestId == w.warehouseId}">
                            </option>
                        </select>

                        <button type="submit" class="btn btn-outline">Filter</button>
                        <a th:href="@{/transfer/approvals}" class="btn btn-outline">Reset</a>
                    </form>

                    <!-- EMPTY -->
                    <div th:if="${#lists.isEmpty(transfers)}" class="empty-state">
                        <p>No transfer requests found.</p>
                    </div>

                    <!-- TABLE -->
                    <div th:unless="${#lists.isEmpty(transfers)}" class="table-wrapper">
                        <table>
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>TR Number</th>
                                <th>Source Warehouse</th>
                                <th>Destination</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="tr, iter : ${transfers}">
                                <td th:text="${iter.count}"></td>

                                <td>
                                    <strong th:text="${tr.transferNumber}"></strong>
                                </td>

                                <td th:text="${tr.sourceWarehouseName}"></td>

                                <td>
                                    <strong th:text="${tr.destinationWarehouseName}"></strong>
                                </td>

                                <!-- STATUS -->
                                <td>

                                    <span th:if="${tr.trStatus == 'Pending'}"
                                          class="badge badge-warning"
                                          th:text="${tr.trStatus}"></span>

                                    <span th:if="${tr.trStatus == 'Approved'}"
                                          class="badge badge-info"
                                          th:text="${tr.trStatus}"></span>

                                    <span th:if="${tr.trStatus == 'In-Transit'}"
                                          class="badge badge-primary"
                                          th:text="${tr.trStatus}"></span>

                                    <span th:if="${tr.trStatus == 'Completed'}"
                                          class="badge badge-success"
                                          th:text="${tr.trStatus}"></span>

                                    <span th:if="${tr.trStatus == 'Rejected'}"
                                          class="badge badge-danger"
                                          th:text="${tr.trStatus}"></span>

                                </td>

                                <td>
                                    <a th:href="@{/transfer/approvals/{id}/review(id=${tr.trId})}"
                                       class="btn btn-outline btn-sm">
                                        Review
                                    </a>
                                </td>

                            </tr>
                            </tbody>
                        </table>
                    </div>

                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
