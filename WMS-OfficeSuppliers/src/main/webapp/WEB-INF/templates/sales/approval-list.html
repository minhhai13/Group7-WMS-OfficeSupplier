<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>SO Approvals - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar-sales}"></div>
        <div class="main-content">
            <div th:replace="~{fragments/layout :: topbar('SO Approvals')}"></div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card">
                    <div class="card-header">
                        <h2>Sales Order Approvals</h2>
                    </div>
                    <div class="card-body">
                        <!-- Filter Bar -->
                        <form th:action="@{/sales/approvals}" method="get" class="search-bar">
                            <select name="status" class="form-control" style="max-width: 200px;">
                                <option value="All" th:selected="${selectedStatus == 'All'}">All Statuses</option>
                                <option value="Pending Approval" th:selected="${selectedStatus == 'Pending Approval'}">
                                    Pending Approval</option>
                                <option value="Waiting for Stock"
                                    th:selected="${selectedStatus == 'Waiting for Stock'}">
                                    Waiting for Stock</option>
                                <option value="Approved" th:selected="${selectedStatus == 'Approved'}">Approved</option>
                                <option value="Rejected" th:selected="${selectedStatus == 'Rejected'}">Rejected</option>
                                <option value="Completed" th:selected="${selectedStatus == 'Completed'}">Completed
                                </option>
                            </select>
                            <select name="customerId" class="form-control" style="max-width: 220px;">
                                <option value="">All Customers</option>
                                <option th:each="c : ${customers}" th:value="${c.partnerId}" th:text="${c.partnerName}"
                                    th:selected="${selectedCustomerId != null && selectedCustomerId == c.partnerId}">
                                </option>
                            </select>
                            <button type="submit" class="btn btn-outline">Filter</button>
                            <a th:href="@{/sales/approvals}" class="btn btn-outline">Reset</a>
                        </form>

                        <div th:if="${#lists.isEmpty(orders)}" class="empty-state">
                            <p>No sales orders found.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(orders)}" class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>SO Number</th>
                                        <th>Customer</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="so, iter : ${orders}">
                                        <td th:text="${iter.count}"></td>
                                        <td><strong th:text="${so.soNumber}"></strong></td>
                                        <td th:text="${so.customerName} ?: '—'"></td>
                                        <td>
                                            <span th:if="${so.soStatus == 'Pending Approval'}"
                                                class="badge badge-warning" th:text="${so.soStatus}"></span>
                                            <span th:if="${so.soStatus == 'Waiting for Stock'}"
                                                class="badge badge-warning" th:text="${so.soStatus}"></span>
                                            <span th:if="${so.soStatus == 'Approved'}" class="badge badge-success"
                                                th:text="${so.soStatus}"></span>
                                            <span th:if="${so.soStatus == 'Rejected'}" class="badge badge-danger"
                                                th:text="${so.soStatus}"></span>
                                            <span th:if="${so.soStatus == 'Completed'}" class="badge badge-success"
                                                th:text="${so.soStatus}"></span>
                                            <span th:if="${so.soStatus == 'Incomplete'}" class="badge badge-secondary"
                                                th:text="${so.soStatus}"></span>
                                            <!-- PR indicator -->
                                            <small th:if="${so.hasPR}"
                                                style="display:block; color:#6366f1; margin-top:2px;"
                                                th:text="'📝 ' + ${so.prNumber}"></small>
                                        </td>
                                        <td>
                                            <a th:href="@{/sales/approvals/{id}/review(id=${so.soId})}"
                                                class="btn btn-outline btn-sm">Review</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
