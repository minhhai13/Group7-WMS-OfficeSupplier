<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Warehouses - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-admin}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Warehouse Management')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <div class="card">
                <div class="card-header">
                    <h2>All Warehouses</h2>
                    <a th:href="@{/admin/warehouses/new}" class="btn btn-primary btn-sm">+ New Warehouse</a>
                </div>

                <div class="card-body">
                    <!-- Search -->
                    <div>
                        <form th:action="@{/admin/warehouses}" method="get" class="search-bar">
                            <input type="text" name="keyword" class="form-control"
                                   placeholder="Search by name..." th:value="${keyword}">
                            <button type="submit" class="btn btn-outline">Search</button>
                            <a th:if="${keyword != null}" th:href="@{/admin/warehouses}" class="btn btn-outline">Clear</a>
                        </form>
                    </div>

                    <!-- Result info -->
                    <div th:if="${totalElements != null}" style="margin-bottom: 0.5rem; color: var(--text-secondary); font-size: 0.875rem;">
                        Showing
                        <strong th:text="${currentPage * 10 + 1}"></strong>–<strong th:text="${(currentPage * 10 + #lists.size(warehouses))}"></strong>
                        of <strong th:text="${totalElements}"></strong> warehouses
                    </div>

                    <!-- Empty state -->
                    <div th:if="${#lists.isEmpty(warehouses)}" class="empty-state">
                        <p>No warehouses found. Create your first warehouse.</p>
                    </div>

                    <!-- Table -->
                    <div th:unless="${#lists.isEmpty(warehouses)}" class="table-wrapper">
                        <table>
                            <thead>
                            <tr>
                                <th>#</th>
                                <th>Code</th>
                                <th>Name</th>
                                <th>Address</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="wh, iter : ${warehouses}">
                                <td th:text="${currentPage * 10 + iter.count}"></td>
                                <td><strong th:text="${wh.warehouseCode}"></strong></td>
                                <td th:text="${wh.warehouseName}"></td>
                                <td th:text="${wh.address}"></td>
                                <td>
                                    <span th:if="${wh.isActive}" class="badge badge-success">Active</span>
                                    <span th:unless="${wh.isActive}" class="badge badge-danger">Inactive</span>
                                </td>
                                <td>
                                    <div class="btn-group">
                                        <a th:href="@{/admin/warehouses/{id}/edit(id=${wh.warehouseId})}"
                                           class="btn btn-outline btn-sm">Edit</a>
                                        <form th:action="@{/admin/warehouses/{id}/toggle(id=${wh.warehouseId})}"
                                              method="post" style="display:inline;">
                                            <button type="submit"
                                                    th:class="${wh.isActive} ? 'btn btn-warning btn-sm' : 'btn btn-success btn-sm'"
                                                    th:text="${wh.isActive} ? 'Deactivate' : 'Activate'"></button>
                                        </form>
                                    </div>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                    <!-- Pagination -->
                    <div th:if="${totalPages > 1}" class="pagination-wrapper">
                        <a th:if="${currentPage > 0}"
                           th:href="@{/admin/warehouses(page=${currentPage - 1}, keyword=${keyword})}"
                           class="btn btn-outline btn-sm">&laquo; Prev</a>
                        <span th:unless="${currentPage > 0}" class="btn btn-outline btn-sm disabled">&laquo; Prev</span>

                        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                            <a th:if="${i != currentPage}"
                               th:href="@{/admin/warehouses(page=${i}, keyword=${keyword})}"
                               th:text="${i + 1}"
                               class="btn btn-outline btn-sm"></a>
                            <strong th:if="${i == currentPage}"
                                    th:text="${i + 1}"
                                    class="btn btn-primary btn-sm" style="pointer-events:none;"></strong>
                        </span>

                        <a th:if="${currentPage < totalPages - 1}"
                           th:href="@{/admin/warehouses(page=${currentPage + 1}, keyword=${keyword})}"
                           class="btn btn-outline btn-sm">Next &raquo;</a>
                        <span th:unless="${currentPage < totalPages - 1}" class="btn btn-outline btn-sm disabled">Next &raquo;</span>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>
</body>

</html>
