<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Receive Goods - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="app-layout">
    <div th:replace="~{fragments/layout :: sidebar-storekeeper}"></div>
    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Receive Goods')}"></div>
        <div class="content-area">
            <div th:replace="~{fragments/layout :: alerts}"></div>

            <!-- GRN Header (Read-only) -->
            <div class="card" style="margin-bottom: 1.5rem;">
                <div class="card-header">
                    <h2>GRN Information</h2>
                    <span th:if="${grnDTO.grStatus == 'Draft'}" class="badge badge-warning"
                          th:text="${grnDTO.grStatus}"></span>
                    <span th:if="${grnDTO.grStatus == 'Posted'}" class="badge badge-success"
                          th:text="${grnDTO.grStatus}"></span>
                </div>
                <div class="card-body">
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 1.5rem;">
                        <div class="form-group">
                            <label>GRN Number</label>
                            <input type="text" class="form-control" th:value="${grnDTO.grnNumber}" readonly
                                   disabled>
                        </div>
                        <div class="form-group">
                            <label>PO Number</label>
                            <input type="text" class="form-control" th:value="${grnDTO.poNumber}" readonly disabled>
                        </div>
                        <div class="form-group">
                            <label>Supplier</label>
                            <input type="text" class="form-control" th:value="${grnDTO.supplierName}" readonly
                                   disabled>
                        </div>
                        <div class="form-group">
                            <label>Warehouse</label>
                            <input type="text" class="form-control" th:value="${grnDTO.warehouseName}" readonly
                                   disabled>
                        </div>
                    </div>
                </div>
            </div>

            <!-- GRN Details -->
            <form th:action="@{/storekeeper/grn/{id}/post(id=${grnDTO.grnId})}" method="post" id="grnForm">
                <div class="card" style="margin-bottom: 1.5rem;">
                    <div class="card-header">
                        <h2>Goods Detail Lines</h2>
                    </div>
                    <div class="card-body">
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                <tr>
                                    <th style="width:5%;">#</th>
                                    <th style="width:25%;">Product</th>
                                    <th style="width:10%;">UoM</th>
                                    <th style="width:15%;">Bin</th>
                                    <th style="width:15%;">Batch</th>
                                    <th style="width:10%;">Ordered Qty</th>
                                    <th style="width:15%;">Received Qty</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="detail, iter : ${grnDTO.details}">
                                    <td th:text="${iter.count}"></td>
                                    <td th:text="${detail.productDisplayName}"></td>
                                    <td th:text="${detail.uom}"></td>
                                    <td><span class="badge badge-secondary"
                                              th:text="${detail.binLocation}"></span></td>
                                    <td><small th:text="${detail.batchNumber}"></small></td>
                                    <td><strong th:text="${detail.orderedQty}"></strong></td>
                                    <td>
                                        <input type="hidden" name="grDetailId" th:value="${detail.grDetailId}">
                                        <!-- Draft: editable input -->
                                        <input th:if="${grnDTO.grStatus == 'Draft'}" type="number"
                                               name="receivedQty" class="form-control received-qty-input"
                                               th:value="${detail.receivedQty}" min="0"
                                               th:max="${detail.orderedQty}" th:data-ordered="${detail.orderedQty}"
                                               required style="max-width: 120px;">
                                        <!-- Posted: read-only display -->
                                        <span th:if="${grnDTO.grStatus == 'Posted'}"
                                              th:text="${detail.receivedQty}"></span>
                                    </td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons -->
                <div class="card">
                    <div class="card-body" style="display: flex; gap: 1rem; justify-content: flex-end;">
                        <a th:href="@{/storekeeper/grn}" class="btn btn-outline">Back to List</a>
                        <button th:if="${grnDTO.grStatus == 'Draft'}" type="submit" class="btn btn-primary"
                                onclick="return validateAndConfirm();">
                            ✅ Confirm & Post
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function validateAndConfirm() {
        var inputs = document.querySelectorAll('.received-qty-input');
        for (var i = 0; i < inputs.length; i++) {
            var received = parseInt(inputs[i].value) || 0;
            var ordered = parseInt(inputs[i].getAttribute('data-ordered')) || 0;

            if (received < 0) {
                alert('Số lượng thực nhận không được âm.');
                inputs[i].focus();
                return false;
            }
            if (received > ordered) {
                alert('Số lượng thực nhận không được lớn hơn số lượng đặt (' + ordered + ').');
                inputs[i].focus();
                return false;
            }
        }
        return confirm('Bạn có chắc chắn muốn ghi sổ (Post) phiếu nhập kho này? Hành động này không thể hoàn tác.');
    }
</script>
</body>

</html>
