<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title th:text="${soDTO.soId != null} ? 'Edit Sales Order - WMS' : 'New Sales Order - WMS'">SO Form - WMS
    </title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <div th:replace="~{fragments/layout :: sidebar-sales}"></div>
        <div class="main-content">
            <div
                th:replace="~{fragments/layout :: topbar(${soDTO.soId != null} ? 'Edit Sales Order' : 'New Sales Order')}">
            </div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <!-- Shortage Warning Panel (shown when ATP check fails) -->
                <div th:if="${shortages != null && !shortages.isEmpty()}" class="alert alert-danger"
                    style="margin-bottom: 1.5rem;">
                    <strong>⚠️ Kho không đủ hàng cho các sản phẩm sau:</strong>
                    <table
                        style="width:100%; margin-top: 0.5rem; background: rgba(255,255,255,0.9); border-radius: 4px;">
                        <thead>
                            <tr style="font-weight:600; border-bottom: 1px solid #ddd;">
                                <td style="padding:6px 8px;">Sản phẩm</td>
                                <td style="padding:6px 8px;">Cần</td>
                                <td style="padding:6px 8px;">Có sẵn (ATP)</td>
                                <td style="padding:6px 8px;">Thiếu</td>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="s : ${shortages}">
                                <td style="padding:4px 8px;" th:text="${s.sku + ' - ' + s.productName}"></td>
                                <td style="padding:4px 8px;" th:text="${s.orderedQty + ' ' + s.uom}"></td>
                                <td style="padding:4px 8px;" th:text="${s.availableQty + ' ' + s.uom}"></td>
                                <td style="padding:4px 8px; color:#ef4444; font-weight:600;"
                                    th:text="${s.missingQty + ' ' + s.uom}"></td>
                            </tr>
                        </tbody>
                    </table>
                    <p style="margin-top: 0.75rem; margin-bottom: 0;">Nhấn <strong>"Gửi kèm PR"</strong> để tự động tạo
                        Purchase Request cho lượng thiếu, hoặc chỉnh sửa đơn hàng.</p>
                </div>

                <form th:action="@{/sales/orders/save}" method="post" th:object="${soDTO}" id="soForm">
                    <!-- Hidden fields -->
                    <input type="hidden" th:field="*{soId}">
                    <input type="hidden" th:field="*{warehouseId}">

                    <!-- Reject Reason Alert -->
                    <div th:if="${soDTO.soStatus == 'Rejected' && soDTO.rejectReason != null}"
                        class="alert alert-danger" style="margin-bottom: 1.5rem;">
                        <strong>⚠️ This SO was rejected.</strong><br>
                        <strong>Reason:</strong> <span th:text="${soDTO.rejectReason}"></span>
                    </div>

                    <div class="card" style="margin-bottom: 1.5rem;">
                        <div class="card-header">
                            <h2>Order Information</h2>
                        </div>
                        <div class="card-body">
                            <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.5rem;">
                                <!-- Customer -->
                                <div class="form-group">
                                    <label for="customerId">Customer <span style="color:red;">*</span></label>
                                    <select id="customerId" th:field="*{customerId}" class="form-control"
                                        th:disabled="${soDTO.soStatus != null && soDTO.soStatus != 'Draft' && soDTO.soStatus != 'Rejected'}">
                                        <option value="">-- Select Customer --</option>
                                        <option th:each="c : ${customers}" th:value="${c.partnerId}"
                                            th:text="${c.partnerName}"></option>
                                    </select>
                                    <div class="text-danger" th:if="${#fields.hasErrors('customerId')}"
                                        th:errors="*{customerId}"></div>
                                </div>
                                <!-- SO Number -->
                                <div class="form-group">
                                    <label>SO Number</label>
                                    <input type="text" class="form-control"
                                        th:value="${soDTO.soNumber != null} ? ${soDTO.soNumber} : 'Auto-generated'"
                                        readonly disabled>
                                </div>
                                <!-- Warehouse -->
                                <div class="form-group">
                                    <label>Warehouse</label>
                                    <input type="text" class="form-control" th:value="${soDTO.warehouseName}" readonly
                                        disabled>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Order Lines -->
                    <div class="card" style="margin-bottom: 1.5rem;">
                        <div class="card-header">
                            <h2>Order Lines</h2>
                            <div class="text-danger" th:if="${#fields.hasErrors('details')}" th:errors="*{details}"
                                style="font-size: 0.9rem; font-weight: bold;"></div>
                            <button type="button" class="btn btn-primary btn-sm" onclick="addLine()"
                                th:if="${soDTO.soStatus == null || soDTO.soStatus == 'Draft' || soDTO.soStatus == 'Rejected'}"
                                id="addLineBtn">+ Add Product Line</button>
                        </div>
                        <div class="card-body">
                            <div class="table-wrapper">
                                <table id="linesTable">
                                    <thead>
                                        <tr>
                                            <th style="width:5%;">#</th>
                                            <th style="width:35%;">Product</th>
                                            <th style="width:25%;">UoM</th>
                                            <th style="width:20%;">Quantity</th>
                                            <th style="width:15%;">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody id="linesBody">
                                        <!-- Existing lines (for edit) -->
                                        <tr th:each="detail, iter : ${soDTO.details}" th:with="idx=${iter.index}">
                                            <td class="line-number" th:text="${iter.count}"></td>
                                            <td>
                                                <select th:name="'details[' + ${idx} + '].productId'"
                                                    class="form-control product-select" th:attr="data-index=${idx}"
                                                    onchange="onProductChange(this)"
                                                    th:disabled="${soDTO.soStatus != null && soDTO.soStatus != 'Draft' && soDTO.soStatus != 'Rejected'}">
                                                    <option value="">-- Select Product --</option>
                                                    <option th:each="p : ${products}" th:value="${p.productId}"
                                                        th:text="${p.sku + ' - ' + p.productName}"
                                                        th:selected="${detail.productId != null && detail.productId == p.productId}">
                                                    </option>
                                                </select>
                                                <div class="text-danger"
                                                    th:if="${#fields.hasErrors('details[' + idx + '].productId')}"
                                                    th:errors="*{details[__${idx}__].productId}"
                                                    style="font-size: 0.75rem;"></div>
                                                <input type="hidden" th:name="'details[' + ${idx} + '].soDetailId'"
                                                    th:value="${detail.soDetailId}">
                                            </td>
                                            <td>
                                                <select th:name="'details[' + ${idx} + '].uom'"
                                                    class="form-control uom-select" th:id="'uom-' + ${idx}"
                                                    th:disabled="${soDTO.soStatus != null && soDTO.soStatus != 'Draft' && soDTO.soStatus != 'Rejected'}">
                                                    <option value="">-- Select UoM --</option>
                                                    <option th:if="${detail.uom != null}" th:value="${detail.uom}"
                                                        th:text="${detail.uom}" selected></option>
                                                </select>
                                                <div class="text-danger"
                                                    th:if="${#fields.hasErrors('details[' + idx + '].uom')}"
                                                    th:errors="*{details[__${idx}__].uom}" style="font-size: 0.75rem;">
                                                </div>
                                            </td>
                                            <td>
                                                <input type="number" th:name="'details[' + ${idx} + '].orderedQty'"
                                                    class="form-control" th:value="${detail.orderedQty}"
                                                    th:readonly="${soDTO.soStatus != null && soDTO.soStatus != 'Draft' && soDTO.soStatus != 'Rejected'}">
                                                <div class="text-danger"
                                                    th:if="${#fields.hasErrors('details[' + idx + '].orderedQty')}"
                                                    th:errors="*{details[__${idx}__].orderedQty}"
                                                    style="font-size: 0.75rem;"></div>
                                            </td>
                                            <td>
                                                <button type="button" class="btn btn-danger btn-sm"
                                                    onclick="removeLine(this)"
                                                    th:if="${soDTO.soStatus == null || soDTO.soStatus == 'Draft' || soDTO.soStatus == 'Rejected'}">✕</button>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>

                    <!-- Action Buttons -->
                    <div class="card"
                        th:if="${soDTO.soStatus == null || soDTO.soStatus == 'Draft' || soDTO.soStatus == 'Rejected' || soDTO.soStatus == 'Pending Approval'}">
                        <div class="card-body" style="display: flex; gap: 1rem; justify-content: flex-end;">
                            <a th:href="@{/sales/orders}" class="btn btn-outline">Cancel</a>
                            <button type="submit" name="action" value="draft" class="btn btn-outline"
                                th:if="${soDTO.soStatus == null || soDTO.soStatus == 'Draft' || soDTO.soStatus == 'Rejected'}">Save
                                Draft</button>
                            <button type="submit" name="action" value="submit" class="btn btn-primary"
                                th:if="${shortages == null || shortages.isEmpty()}">Submit for Approval</button>
                            <!-- Submit with PR button (shown when there are shortages) -->
                            <button type="submit" name="action" value="submitWithPR" class="btn btn-primary"
                                th:if="${shortages != null && !shortages.isEmpty()}"
                                onclick="return confirm('Xác nhận gửi đơn hàng kèm Purchase Request cho lượng thiếu?');">📋
                                Gửi kèm PR</button>
                        </div>
                    </div>
                    <div class="card"
                        th:if="${soDTO.soStatus != null && soDTO.soStatus != 'Draft' && soDTO.soStatus != 'Rejected' && soDTO.soStatus != 'Pending Approval'}">
                        <div class="card-body" style="display: flex; gap: 1rem; justify-content: flex-end;">
                            <a th:href="@{/sales/orders}" class="btn btn-outline">Back to List</a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        /*<![CDATA[*/
        var products = /*[[${products}]]*/[];
        var contextPath = /*[[@{/}]]*/ '/';
        var lineIndex = /*[[${soDTO.details != null ? soDTO.details.size() : 0}]]*/ 0;

        if (contextPath.endsWith('/')) {
            contextPath = contextPath.substring(0, contextPath.length - 1);
        }

        // ===== Add new product line =====
        function addLine() {
            var tbody = document.getElementById('linesBody');
            var idx = lineIndex++;
            var tr = document.createElement('tr');

            var productOptions = '<option value="">-- Select Product --</option>';
            for (var i = 0; i < products.length; i++) {
                var p = products[i];
                productOptions += '<option value="' + p.productId + '">' + p.sku + ' - ' + p.productName + '</option>';
            }

            tr.innerHTML =
                '<td class="line-number">' + (tbody.rows.length + 1) + '</td>' +
                '<td>' +
                '<select name="details[' + idx + '].productId" class="form-control product-select" data-index="' + idx + '" onchange="onProductChange(this)">' +
                productOptions +
                '</select>' +
                '</td>' +
                '<td>' +
                '<select name="details[' + idx + '].uom" id="uom-' + idx + '" class="form-control uom-select">' +
                '<option value="">-- Select UoM --</option>' +
                '</select>' +
                '</td>' +
                '<td>' +
                '<input type="number" name="details[' + idx + '].orderedQty" class="form-control" min="1" placeholder="Qty">' +
                '</td>' +
                '<td>' +
                '<button type="button" class="btn btn-danger btn-sm" onclick="removeLine(this)">✕</button>' +
                '</td>';

            tbody.appendChild(tr);
            renumberLines();
        }

        // ===== Remove product line =====
        function removeLine(btn) {
            var tr = btn.closest('tr');
            tr.remove();
            renumberLines();
        }

        // ===== Renumber line numbers =====
        function renumberLines() {
            var rows = document.querySelectorAll('#linesBody tr');
            for (var i = 0; i < rows.length; i++) {
                rows[i].querySelector('.line-number').textContent = (i + 1);
            }
        }

        // ===== On product change: load UoMs via AJAX =====
        function onProductChange(selectEl) {
            var productId = selectEl.value;
            var idx = selectEl.getAttribute('data-index');
            var uomSelect = document.getElementById('uom-' + idx);

            uomSelect.innerHTML = '<option value="">-- Select UoM --</option>';

            if (!productId) return;

            fetch(contextPath + '/api/sales/products/' + productId + '/uoms')
                .then(function (response) {
                    if (!response.ok) throw new Error('Failed to load UoMs');
                    return response.json();
                })
                .then(function (uoms) {
                    for (var i = 0; i < uoms.length; i++) {
                        var option = document.createElement('option');
                        option.value = uoms[i].uom;
                        option.textContent = uoms[i].label;
                        uomSelect.appendChild(option);
                    }
                })
                .catch(function (err) {
                    console.error('Error loading UoMs:', err);
                });
        }

        // ===== On page load: load UoMs for existing lines =====
        document.addEventListener('DOMContentLoaded', function () {
            var existingSelects = document.querySelectorAll('.product-select');
            existingSelects.forEach(function (sel) {
                if (sel.value) {
                    var idx = sel.getAttribute('data-index');
                    var uomSelect = document.getElementById('uom-' + idx);
                    var currentUom = uomSelect.value;

                    fetch(contextPath + '/api/sales/products/' + sel.value + '/uoms')
                        .then(function (response) { return response.json(); })
                        .then(function (uoms) {
                            uomSelect.innerHTML = '<option value="">-- Select UoM --</option>';
                            for (var i = 0; i < uoms.length; i++) {
                                var option = document.createElement('option');
                                option.value = uoms[i].uom;
                                option.textContent = uoms[i].label;
                                if (uoms[i].uom === currentUom) {
                                    option.selected = true;
                                }
                                uomSelect.appendChild(option);
                            }
                        })
                        .catch(function (err) {
                            console.error('Error loading UoMs for existing line:', err);
                        });
                }
            });
        });
        /*]]>*/
    </script>
</body>

</html>
