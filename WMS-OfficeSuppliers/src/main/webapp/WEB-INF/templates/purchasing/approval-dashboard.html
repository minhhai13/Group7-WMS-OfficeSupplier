<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>PO Approvals - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <!-- Bootstrap integration assumed based on class convention -->
    <style>
        .po-detail-card {
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        .text-right {
            text-align: right;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: sidebar-purchasing-manager}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('PO Approval Dashboard')}"></div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div class="card">
            <div class="card-header">
                <h2>Pending Purchase Orders</h2>
            </div>

            <div class="card-body">
                <div th:if="${#lists.isEmpty(pendingPOs)}" class="alert alert-info">
                    There are no Purchase Orders pending approval at this time.
                </div>

                <div th:each="po : ${pendingPOs}" class="po-detail-card">
                    <div
                        style="display: flex; justify-content: space-between; border-bottom: 1px solid #ccc; padding-bottom: 10px; margin-bottom: 10px;">
                        <div>
                            <h4><span th:text="${po.poNumber}">PO-NUM</span></h4>
                            <p><strong>Supplier:</strong> <span th:text="${po.supplier.partnerName}">Supplier
                                    Name</span></p>
                            <p><strong>Warehouse:</strong> <span th:text="${po.warehouse.warehouseName}">Warehouse
                                    Name</span></p>
                        </div>
                        <div class="text-right">
                            <span class="badge bg-warning" th:text="${po.poStatus}">Pending</span>
                            <div class="mt-2" style="margin-top: 15px;">
                                <form th:action="@{/purchasing/approve/{id}(id=${po.poId})}" method="post"
                                    style="display:inline;">
                                    <button type="submit" class="btn btn-success"
                                        onclick="return confirm('Are you sure you want to approve this PO? A Goods Receipt Note (GRN) will be automatically generated.');">✔️
                                        Approve</button>
                                </form>
                                <form th:action="@{/purchasing/reject/{id}(id=${po.poId})}" method="post"
                                    style="display:inline; margin-left: 10px;">
                                    <button type="submit" class="btn btn-danger"
                                        onclick="return confirm('Are you sure you want to reject this PO? It will be sent back to purchasing staff.');">❌
                                        Reject</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <h5>Order Items</h5>
                    <table class="table table-sm">
                        <thead style="background-color: #e9ecef;">
                            <tr>
                                <th>Product SKU</th>
                                <th>Product Name</th>
                                <th>Quantity</th>
                                <th>UoM</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="detail : ${po.details}">
                                <td th:text="${detail.product.sku}">SKU</td>
                                <td th:text="${detail.product.productName}">Name</td>
                                <td th:text="${detail.orderedQty}">0</td>
                                <td th:text="${detail.uom}">UoM</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
