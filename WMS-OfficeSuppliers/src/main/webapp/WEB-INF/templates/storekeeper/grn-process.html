<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Process GRN - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <script th:src="@{https://code.jquery.com/jquery-3.6.0.min.js}"></script>
    <style>
        .table-input {
            width: 100%;
            padding: 5px;
            box-sizing: border-box;
        }

        .readonly-input {
            background-color: #e9ecef;
            pointer-events: none;
        }

        .product-header-row {
            background-color: #d1ecf1;
            font-weight: bold;
        }

        .detail-row {
            background-color: #fff;
        }

        .split-btn {
            margin-left: 10px;
            padding: 2px 5px;
            font-size: 0.8em;
        }

        .weight-danger {
            border: 2px solid red;
            background-color: #ffe6e6;
        }

        .weight-warning-msg {
            color: red;
            font-size: 0.8em;
            display: none;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/layout :: sidebar-storekeeper}"></div>

    <div class="main-content">
        <div th:replace="~{fragments/layout :: topbar('Process GRN: ' + grnDTO.grnNumber)}"></div>
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <div th:if="${#fields.hasErrors('${grnDTO.*}')}" class="alert alert-danger">
            <ul>
                <li th:each="err : ${#fields.errors('${grnDTO.*}')}" th:text="${err}"></li>
            </ul>
        </div>

        <div class="card">
            <div class="card-body">
                <form id="grnForm" th:action="@{/storekeeper/grn-process}" th:object="${grnDTO}" method="post">
                    <input type="hidden" th:field="*{grnId}">
                    <input type="hidden" th:field="*{grnNumber}">
                    <input type="hidden" th:field="*{poId}">

                    <div style="display: flex; gap: 20px; margin-bottom: 20px;">
                        <div><strong>PO Number:</strong> <span th:text="*{poNumber}"></span></div>
                        <div><strong>Status:</strong> <span th:text="*{grStatus}"></span></div>
                    </div>

                    <!-- Hidden data source for unit weights -->
                    <div id="unitWeightsData" style="display: none;">
                        <span th:each="pd : ${poDetailsFull}" th:id="'uweight-' + ${pd.poDetailId}"
                            th:text="${pd.product.unitWeight}"></span>
                    </div>

                    <table class="table" id="grnTable">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Bin Selection</th>
                                <th>Received Qty</th>
                                <th>Batch No.</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Iterate over unique products to create a header row and then detail rows -->
                            <th:block th:each="detail, stat : *{details}">
                                <tr class="detail-row" th:data-podetailid="${detail.poDetailId}"
                                    th:data-index="${stat.index}">
                                    <input type="hidden" th:field="*{details[__${stat.index}__].poDetailId}">
                                    <input type="hidden" th:field="*{details[__${stat.index}__].productId}">
                                    <input type="hidden" th:field="*{details[__${stat.index}__].orderedQty}"
                                        class="ordered-qty">
                                    <input type="hidden" th:field="*{details[__${stat.index}__].previousReceivedQty}"
                                        class="prev-qty">
                                    <input type="hidden" th:field="*{details[__${stat.index}__].uom}">

                                    <td>
                                        <div th:text="${detail.productSku + ' - ' + detail.productName}"></div>
                                        <div style="font-size: 0.85em; color: #666;">
                                            Ordered: <span th:text="${detail.orderedQty}"></span> <span
                                                th:text="${detail.uom}"></span> |
                                            Received: <span th:text="${detail.previousReceivedQty}"></span> <span
                                                th:text="${detail.uom}"></span>
                                            (<span class="rem-qty"
                                                th:text="${detail.orderedQty - detail.previousReceivedQty}"></span>
                                            remaining)
                                        </div>
                                        <button type="button" class="btn btn-secondary split-btn"
                                            th:data-podetailid="${detail.poDetailId}">+ Split Bin</button>
                                    </td>
                                    <td>
                                        <select th:field="*{details[__${stat.index}__].binId}"
                                            class="table-input bin-select" required>
                                            <option value="">-- Select Bin --</option>
                                        </select>
                                    </td>
                                    <td>
                                        <input type="number" th:field="*{details[__${stat.index}__].receivedQty}"
                                            class="table-input qty-input" min="0" required>
                                        <div class="weight-warning-msg">Bin overloaded</div>
                                    </td>
                                    <td>
                                        <input type="text" th:field="*{details[__${stat.index}__].batchNumber}"
                                            class="table-input" placeholder="Auto-generate if empty">
                                    </td>
                                    <td>
                                        <button type="button" class="btn btn-sm btn-danger delete-row-btn"
                                            style="display:none;">🗑️</button>
                                    </td>
                                </tr>
                            </th:block>
                        </tbody>
                    </table>

                    <div class="form-group mt-4">
                        <button type="submit" id="btnConfirmReceipt" class="btn btn-primary"
                            onclick="return validateAndConfirm();">Confirm Receipt</button>
                        <a th:href="@{/storekeeper/grn-list}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        $(document).ready(function () {
            var contextPath = /*[[@{/}]]*/ '';
            if (contextPath === '/') contextPath = '';
            var warehouseId = /*[[${warehouseId}]]*/ 0;
            var availableBins = [];

            // Fetch available bins
            $.get(contextPath + '/api/storekeeper/warehouse/' + warehouseId + '/available-bins', function (data) {
                availableBins = data;
                populateBinDropdowns();
            });

            function populateBinDropdowns() {
                var options = '<option value="">-- Select Bin --</option>';
                availableBins.forEach(function (bin) {
                    options += '<option value="' + bin.binId + '" data-maxw="' + bin.maxWeight + '">' + bin.binLocation + ' (' + bin.maxWeight.toFixed(2) + ' kg avail)</option>';
                });
                $('.bin-select').each(function () {
                    var currentVal = $(this).val();
                    $(this).html(options);
                    if (currentVal) {
                        $(this).val(currentVal);
                    }
                });
            }

            function getBinOptions() {
                var options = '<option value="">-- Select Bin --</option>';
                availableBins.forEach(function (bin) {
                    options += '<option value="' + bin.binId + '" data-maxw="' + bin.maxWeight + '">' + bin.binLocation + ' (' + bin.maxWeight.toFixed(2) + ' kg avail)</option>';
                });
                return options;
            }

            // Split Bin Logic
            $('.split-btn').click(function () {
                var btn = $(this);
                var poDetailId = btn.data('podetailid');
                var originalRow = $('tr[data-podetailid="' + poDetailId + '"]').last();

                var newIndex = $('#grnTable tbody tr').length;

                var clone = originalRow.clone();
                clone.attr('data-index', newIndex);

                // Remove product text and split button from clone
                clone.find('td:first-child').html('');

                // Show delete button on clone
                clone.find('.delete-row-btn').show();

                // Update names and IDs
                clone.find('input, select').each(function () {
                    var name = $(this).attr('name');
                    if (name) {
                        var newName = name.replace(/details\[\d+\]/, 'details[' + newIndex + ']');
                        $(this).attr('name', newName);
                    }
                    var id = $(this).attr('id');
                    if (id) {
                        var newId = id.replace(/details\d+/, 'details' + newIndex);
                        $(this).attr('id', newId);
                    }

                    // clear values for inputs
                    if ($(this).hasClass('qty-input') || $(this).attr('type') === 'text') {
                        $(this).val('');
                        $(this).removeClass('weight-danger');
                    }
                });

                clone.find('.weight-warning-msg').hide();

                originalRow.after(clone);
                reindexRows();
            });

            // Delete row logic
            $(document).on('click', '.delete-row-btn', function () {
                $(this).closest('tr').remove();
                reindexRows();
                triggerValidation();
            });

            function reindexRows() {
                $('#grnTable tbody tr').each(function (index) {
                    var row = $(this);
                    row.attr('data-index', index);
                    row.find('input, select').each(function () {
                        var name = $(this).attr('name');
                        if (name) {
                            var newName = name.replace(/details\[\d+\]/, 'details[' + index + ']');
                            $(this).attr('name', newName);
                        }
                        var id = $(this).attr('id');
                        if (id) {
                            var newId = id.replace(/details\d+/, 'details' + index);
                            $(this).attr('id', newId);
                        }
                    });
                });
            }

            // Real-time validation
            $(document).on('input keyup change', '.qty-input, .bin-select', function () {
                triggerValidation();
            });

        });

        function triggerValidation() {
            var allValid = true;

            // 1. Check weight per bin
            var binWeights = {}; // binId -> total weight being added
            $('.detail-row').each(function () {
                var row = $(this);
                var binSelect = row.find('.bin-select');
                var binId = binSelect.val();
                var qtyStr = row.find('.qty-input').val();
                var qty = parseFloat(qtyStr);

                if (binId && !isNaN(qty) && qty > 0) {
                    var poDetailId = row.attr('data-podetailid');
                    var unitWeightStr = $('#uweight-' + poDetailId).text();
                    var unitWeight = parseFloat(unitWeightStr);

                    var addedWeight = qty * unitWeight;

                    if (!binWeights[binId]) {
                        binWeights[binId] = { added: 0, max: parseFloat(binSelect.find('option:selected').data('maxw')) };
                    }
                    binWeights[binId].added += addedWeight;
                }
            });

            $('.detail-row').each(function () {
                var row = $(this);
                var binId = row.find('.bin-select').val();
                if (binId && binWeights[binId]) {
                    if (binWeights[binId].added > binWeights[binId].max) {
                        row.find('.qty-input').addClass('weight-danger');
                        row.find('.weight-warning-msg').show();
                        allValid = false;
                    } else {
                        row.find('.qty-input').removeClass('weight-danger');
                        row.find('.weight-warning-msg').hide();
                    }
                }
            });

            // 2. Check total quantity per PO Detail doesn't exceed order qty
            var poDetailQty = {};
            $('.detail-row').each(function () {
                var row = $(this);
                var poDetailId = row.attr('data-podetailid');
                var qty = parseFloat(row.find('.qty-input').val()) || 0;

                if (!poDetailQty[poDetailId]) {
                    var ordered = parseFloat(row.find('.ordered-qty').val());
                    var prev = parseFloat(row.find('.prev-qty').val());
                    var rem = ordered - prev;
                    poDetailQty[poDetailId] = { added: 0, maxAllowed: rem };
                }
                poDetailQty[poDetailId].added += qty;
            });

            var quantityExceeded = false;
            for (var key in poDetailQty) {
                if (poDetailQty[key].added > poDetailQty[key].maxAllowed) {
                    quantityExceeded = true;
                    allValid = false;
                }
            }

            return { valid: allValid, qtyExceeded: quantityExceeded };
        }

        function validateAndConfirm() {
            var res = triggerValidation();
            if (!res.valid) {
                if (res.qtyExceeded) {
                    alert("Total received quantity for one or more products exceeds the remaining ordered quantity. Please correct before submitting.");
                } else {
                    alert("One or more Bins are overloaded. Please fix the highlighted fields before submitting.");
                }
                return false;
            }
            return confirm("Confirm receiving these items into inventory?");
        }
    </script>
</body>

</html>
