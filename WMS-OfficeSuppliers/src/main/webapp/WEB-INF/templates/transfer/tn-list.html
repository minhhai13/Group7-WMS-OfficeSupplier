<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Internal Transfer - WMS</title>
    <link rel="stylesheet" th:href="@{/static/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-layout">
        <th:block th:if="${loggedInUserRole == 'Warehouse Manager'}">
            <div th:replace="~{fragments/layout :: sidebar-report}"></div>
        </th:block>
        <th:block th:if="${loggedInUserRole == 'Storekeeper'}">
            <div th:replace="~{fragments/layout :: sidebar-storekeeper}"></div>
        </th:block>
        <div class="main-content">
            <div th:replace="~{fragments/layout :: topbar('Internal Transfer')}"></div>
            <div class="content-area">
                <div th:replace="~{fragments/layout :: alerts}"></div>

                <div class="card">
                    <div class="card-header">
                        <h2>Internal Transfer</h2>
                        <a th:if="${loggedInUserRole == 'Warehouse Manager'}" th:href="@{/transfer/internal/new}"
                            class="btn btn-primary btn-sm">
                            + Create New Transfer
                        </a>
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(transfers)}" class="empty-state">
                            <p>No internal transfers found.</p>
                        </div>
                        <div th:unless="${#lists.isEmpty(transfers)}" class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>#</th>
                                        <th>TN Number</th>
                                        <th>Warehouse</th>
                                        <th>Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="tn, iter : ${transfers}">
                                        <td th:text="${iter.count}"></td>
                                        <td><strong th:text="${tn.tnNumber}"></strong></td>
                                        <td th:text="${tn.warehouseName}"></td>
                                        <td>
                                            <span th:if="${tn.status == 'Approved'}" class="badge badge-warning">Pending Execution</span>
                                            <span th:if="${tn.status == 'Completed'}" class="badge badge-success">Completed</span>
                                            <span th:if="${tn.status == 'Cancelled'}" class="badge badge-danger">Cancelled</span>
                                        </td>
                                        <td>
                                            <a th:href="@{/transfer/internal/{id}/view(id=${tn.tnId})}"
                                               class="btn btn-outline btn-sm">Details</a>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
</body>

</html>
